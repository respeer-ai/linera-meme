services:
  funder:
    image: "funder"
    container_name: funder
    command: [ "./funder-entrypoint.sh" ]
    extra_hosts:
      - "api.lineraswap.fun=${LAN_IP}"
      - "api.linerameme.fun=${LAN_IP}"
      - "api.${SUB_DOMAIN}lineraswap.fun=${LAN_IP}"
      - "api.${SUB_DOMAIN}linerameme.fun=${LAN_IP}"
    environment:
      SWAP_CHAIN_ID: ${SWAP_CHAIN_ID}
      SWAP_APPLICATION_ID: ${SWAP_APPLICATION_ID}
      SWAP_HOST: ${SWAP_HOST}
      PROXY_CHAIN_ID: ${PROXY_CHAIN_ID}
      PROXY_APPLICATION_ID: ${PROXY_APPLICATION_ID}
      PROXY_HOST: ${PROXY_HOST}
      WALLET_HOST: ${WALLET_HOST}
      WALLET_OWNER: ${WALLET_OWNER}
      WALLET_CHAIN: ${WALLET_CHAIN}
      MAKER_WALLET_CHAIN_ID: ${MAKER_WALLET_CHAIN_ID}
      MAKER_WALLET_HOST: ${MAKER_WALLET_HOST}
      MINER_WALLETS: ${MINER_WALLETS}
    restart: always
