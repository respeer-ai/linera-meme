services:
  kline:
    image: "kline"
    container_name: kline
    ports:
      - "25080:25080"
    command: [ "./kline-entrypoint.sh" ]
    extra_hosts:
      - "api.lineraswap.fun:${LAN_IP}"
      - "api.testnet-conway.lineraswap.fun:${LAN_IP}"
    environment:
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      SWAP_APPLICATION_ID: ${SWAP_APPLICATION_ID}
      SWAP_HOST: ${SWAP_HOST}
      KLINE_DEBUG_TRACES_MAX_BYTES: ${KLINE_DEBUG_TRACES_MAX_BYTES:-1073741824}
      KLINE_DEBUG_TRACES_CLEANUP_INTERVAL_MS: ${KLINE_DEBUG_TRACES_CLEANUP_INTERVAL_MS:-300000}
      KLINE_DEBUG_TRACES_RECENT_FULL_MS: ${KLINE_DEBUG_TRACES_RECENT_FULL_MS:-21600000}
      KLINE_DEBUG_TRACES_SUCCESS_RETENTION_MS: ${KLINE_DEBUG_TRACES_SUCCESS_RETENTION_MS:-604800000}
      KLINE_DEBUG_TRACES_FAILURE_RETENTION_MS: ${KLINE_DEBUG_TRACES_FAILURE_RETENTION_MS:-1209600000}
      KLINE_DEBUG_TRACES_SUCCESS_SAMPLE_MOD: ${KLINE_DEBUG_TRACES_SUCCESS_SAMPLE_MOD:-25}
      KLINE_DEBUG_TRACES_HARD_PRESSURE_SUCCESS_SAMPLE_MOD: ${KLINE_DEBUG_TRACES_HARD_PRESSURE_SUCCESS_SAMPLE_MOD:-100}
      KLINE_DEBUG_TRACES_CLEANUP_BATCH_SIZE: ${KLINE_DEBUG_TRACES_CLEANUP_BATCH_SIZE:-2000}
    restart: always
