version: 1
type: prompt-state
authority: high
derived_from:
  - agents/tasks/board.yaml
purpose: >
  Default low-token task routing state for assistants. This file is derived from the
  task board and canonical docs. It is not a task source.
read_policy:
  read_before:
    - agents/tasks/board.yaml
  read_board_when:
    - updating task status
    - needing full notes for an active task listed here
    - checking dependencies or neighboring tasks for an active task
defaults:
  include_statuses:
    - Doing
    - Blocked
  exclude_statuses:
    - Done
  include_done_only_when:
    - active_semantic_dependency
    - unresolved_caveat_still_relevant
    - canonical_doc_promotion_incomplete
active_focus:
  - id: FUND-002
    why: umbrella task for progressive funds-consistency protocol implementation
    summary: >
      Implement the funds-consistency protocol only through progressive child
      iterations. Current executable child is FUND-007, which splits pool app
      creation from initialization finalization, removes the separate
      initialized-gate design, and moves first real funding paths to
      post-funding finalization without persisted intents.
    canonical_refs:
      - agents/tasks/board.yaml
      - agents/primitives/funding/architecture.md
      - agents/primitives/funding/implementation-plan.md
      - agents/primitives/funding/open-issues.md
  - id: FUND-007
    why: active iteration for pool-app creation / post-funding finalization split
    summary: >
      Split pool application creation from initialization finalization. Pool
      instantiate must create only base app state and must not write final
      reserve/share economics. `PoolCreated` becomes app-created only. Meme
      initialization, user create-pool first funding, and any first real funding
      of a pool without finalized reserve/share facts must converge through a
      dedicated post-funding `FinalizeInitialization` boundary. Use finalized
      reserve/share facts as the gate for normal `Swap`, `RemoveLiquidity`, and
      ordinary existing-pool `AddLiquidity`. Keep meme initialization as an
      internal-only bootstrap discriminator. Do not introduce persisted
      create-pool, add-liquidity, or swap intents.
    canonical_refs:
      - agents/tasks/board.yaml
      - agents/primitives/funding/architecture.md
      - agents/primitives/funding/implementation-plan.md
      - agents/primitives/funding/fund-005-gate-4-handler-transition-table.md
      - agents/primitives/cross-chain.md
      - agents/primitives/identity-and-origin.md
