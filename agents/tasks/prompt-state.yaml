maintenance_rules:
  - Update this file whenever a task changes status between Todo, Doing, Blocked, or Done
  - Remove Done tasks from `active_focus` unless they still satisfy `include_done_only_when`
  - If a task note grows beyond prompt value, move durable semantics to canonical docs and shorten the board note
