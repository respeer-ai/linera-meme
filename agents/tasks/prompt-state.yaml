version: 1
type: prompt-state
authority: high
derived_from:
  - agents/tasks/board.yaml
purpose: >
  Default low-token task routing state for assistants. This file is derived from the
  task board and canonical docs. It is not a task source.
read_policy:
  read_before:
    - agents/tasks/board.yaml
  read_board_when:
    - updating task status
    - needing full notes for an active task listed here
    - checking dependencies or neighboring tasks for an active task
defaults:
  include_statuses:
    - Doing
    - Blocked
  exclude_statuses:
    - Done
  include_done_only_when:
    - active_semantic_dependency
    - unresolved_caveat_still_relevant
    - canonical_doc_promotion_incomplete
active_focus:
  - id: OBS-E2E-001
    why: 端到端 observability 集成测试
    summary: >
      This is now the umbrella verification track: local observability E2E,
      maker-behavior validation against Layer 3 outputs, and remaining frontend
      financial-semantic reconciliation. The recent architecture review follow-ups
      for projection-cursor transactions pagination, event-id realtime payload
      reads, restart-safe candle finality, and position-metrics public field
      cleanup are done.
    read_if_working_on:
      - E2E verification
      - integration testing
      - frontend semantics audit
      - maker impact on kline quality
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-038
    why: positions 的 phase-1 read model 仍在收尾
    summary: >
      `/positions` has already cut over to the new query stack, but the task note still
      tracks continuing position-metrics projection/replay boundary cleanup.
    read_if_working_on:
      - positions read model
      - position-metrics projection cleanup
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-030
    why: maker wallet 执行断点诊断
    summary: >
      Production diagnosis remains active. Current focus is reject or runtime failure at
      creator-chain execution, not kline sync.
    read_if_working_on:
      - maker diagnostics
      - production stall analysis
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-047
    why: maker 做市商算法重构主任务
    summary: >
      Current maker behavior is intentionally noisy because it is still a random
      trade generator with pending-net flush semantics. Active work should route
      through the canonical AMM-market-maker refactor task and its child tasks.
    read_if_working_on:
      - maker algorithm redesign
      - AMM market maker refactor
      - 1min kline quality caused by maker behavior
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-052
    why: 前端资金与收益类指标仍需精确核对
    summary: >
      Frontend primary paths are mostly working, but positions, TVL, APR, and
      related financial semantics still need source-of-truth reconciliation.
    read_if_working_on:
      - positions semantics
      - TVL reconciliation
      - APR calculation audit
      - frontend finance metrics
    canonical_refs:
      - agents/tasks/board.yaml
on_demand_done:
  - id: POS-053
    why: realtime push architecture and legacy Ticker deletion implementation history
    canonical_refs:
      - agents/tasks/board.yaml
      - agents/context/observability-architecture.md
  - id: POS-041
    why: explains why parity or rollback guardrails were intentionally removed
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-028
    why: useful only when touching maker wallet metrics exposure
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-029
    why: useful only when touching maker debug API surfaces
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-046
    why: Rust decoder crate migration and batch subprocess optimization
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-033
    why: application registry and decoder registry design
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-034
    why: Layer 2 normalized events family mappings and normalizer coverage
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-035
    why: Layer 3 market-data contract and product read path cutover
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-044
    why: latestTransactions dependency removal across all product paths
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-032
    why: Layer 1 block ingestion cursor infrastructure
    canonical_refs:
      - agents/tasks/board.yaml
maintenance_rules:
  - Update this file whenever a task changes status between Todo, Doing, Blocked, or Done
  - Remove Done tasks from `active_focus` unless they still satisfy `include_done_only_when`
  - If a task note grows beyond prompt value, move durable semantics to canonical docs and shorten the board note
