version: 1
type: prompt-state
authority: high
derived_from:
  - agents/tasks/board.yaml
purpose: >
  Default low-token task routing state for assistants. This file is derived from the
  task board and canonical docs. It is not a task source.
read_policy:
  read_before:
    - agents/tasks/board.yaml
  read_board_when:
    - updating task status
    - needing full notes for an active task listed here
    - checking dependencies or neighboring tasks for an active task
defaults:
  include_statuses:
    - Doing
    - Blocked
  exclude_statuses:
    - Done
  include_done_only_when:
    - active_semantic_dependency
    - unresolved_caveat_still_relevant
    - canonical_doc_promotion_incomplete
active_focus:
  - id: FUND-002
    why: umbrella task for progressive funds-consistency protocol implementation
    summary: >
      Implement the funds-consistency protocol only through progressive child
      iterations. Current executable child is FUND-013, which audits and hardens residual internal entry and application-caller boundaries after the funding-path iterations.
    canonical_refs:
      - agents/tasks/board.yaml
      - agents/primitives/funding/architecture.md
      - agents/primitives/funding/implementation-plan.md
      - agents/primitives/funding/open-issues.md
  - id: FUND-013
    why: active iteration for internal entry and application-caller hardening
    summary: >
      Audit and close residual unsafe public and cross-application entry points after
      every earlier funding path has implemented its own validation. Reject user access
      to internal initialization and update paths, and verify authenticated caller,
      source chain, expected app, expected leg, and state before internal follow-up
      mutations.
    canonical_refs:
      - agents/tasks/board.yaml
      - agents/primitives/funding/architecture.md
      - agents/primitives/funding/implementation-plan.md
      - agents/primitives/cross-chain.md
      - agents/primitives/identity-and-origin.md
on_demand_done:
  - id: OBS-E2E-001
    why: shell-level observability E2E entrypoint and projection-fact reconciliation completion history
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-045
    why: observability end-to-end architecture review and remaining code-structure cleanup boundaries
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-030
    why: maker wallet diagnostics implementation and limits of Reject-to-panic attribution
    canonical_refs:
