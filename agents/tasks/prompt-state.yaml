version: 1
type: prompt-state
authority: high
derived_from:
  - agents/tasks/board.yaml
purpose: >
  Default low-token task routing state for assistants. This file is derived from the
  task board and canonical docs. It is not a task source.
read_policy:
  read_before:
    - agents/tasks/board.yaml
  read_board_when:
    - updating task status
    - needing full notes for an active task listed here
    - checking dependencies or neighboring tasks for an active task
defaults:
  include_statuses:
    - Doing
    - Blocked
  exclude_statuses:
    - Done
  include_done_only_when:
    - active_semantic_dependency
    - unresolved_caveat_still_relevant
    - canonical_doc_promotion_incomplete
active_focus:
  - id: FUND-002
    why: umbrella task for progressive funds-consistency protocol implementation
    summary: >
      Implement the funds-consistency protocol only through progressive child
      iterations. Next executable child is FUND-005, which establishes the
      contract-path audit and executable baseline before protocol mutation.
    canonical_refs:
      - agents/tasks/board.yaml
      - agents/primitives/funding/architecture.md
      - agents/primitives/funding/implementation-plan.md
      - agents/primitives/funding/open-issues.md
  - id: FUND-005
    why: active iteration for contract-path audit and executable baseline
    summary: >
      Audit current pool/swap/meme/proxy/frontend/observability funding paths,
      map exact files/functions/state transitions, and add only focused
      characterization tests needed before protocol behavior changes. Gate 1E
      audit dimensions and Gate 2 format constraints are accepted; current gate
      is Gate 2 current implementation audit table.
    canonical_refs:
      - agents/tasks/board.yaml
      - agents/primitives/funding/current-delta.md
      - agents/primitives/funding/state-machines.md
      - agents/primitives/cross-chain.md
      - agents/primitives/identity-and-origin.md
on_demand_done:
  - id: OBS-E2E-001
    why: shell-level observability E2E entrypoint and projection-fact reconciliation completion history
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-045
    why: observability end-to-end architecture review and remaining code-structure cleanup boundaries
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-030
    why: maker wallet diagnostics implementation and limits of Reject-to-panic attribution
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-047
    why: maker AMM market-maker implementation history
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-052
    why: automated projection-fact financial reconciliation scope
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-053
    why: realtime push architecture and legacy Ticker deletion implementation history
    canonical_refs:
      - agents/tasks/board.yaml
      - agents/context/observability-architecture.md
  - id: POS-041
    why: explains why parity or rollback guardrails were intentionally removed
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-028
    why: useful only when touching maker wallet metrics exposure
    canonical_refs:
      - agents/tasks/board.yaml
  - id: POS-029
    why: useful only when touching maker debug API surfaces
    canonical_refs:
