new_transaction / set_fee_to / set_fee_to_setter` 映射到第一批 pool-specific Layer 2 families，如 `pool_swap_requested`、`pool_swap_message_observed|rejected`、`pool_fund_success_recorded`、`pool_transaction_recorded` 等；12) bootstrap 现已接入 `decode_result_normalizer`、`normalized_event_repository`、`processing_cursor_repository`、`normalized_event_materializer`、`normalization_worker` 与 `normalization_replay_driver`。当前仍未把 replay driver 接到长期运行后台 worker，也还未做更细的 `meme/proxy` business family 与 pool payload field-level decode。模块接口见 `agents/primitives/observability-interfaces.md`；规范见 `agents/primitives/normalized-event-model.md` 与 `agents/runbooks/observability-deliverables.md`
