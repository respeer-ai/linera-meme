          - A later production evidence pass confirmed maker still continuously sent `swap` mutations to wallet, and wallet balances/token inventory were normal
          - For the three active pools, pool-application `latestTransactions` and kline DB were both stuck at an earlier time, placing the breakpoint in wallet/chain execution rather than kline synchronization

          Current troubleshooting is closed by POS-028/029/030:
          - maker-wallet metrics and maker debug API are complete
          - kline/projection recent audit found no synchronization gap
          - Breakpoint diagnostics can expose the stage where maker->wallet mutation is accepted but projection is not settled
          - Exact mapping from Reject to contract panic point is not an achievable completion condition

          Conclusion: this incident is no longer tracked as a kline synchronization defect. Remaining production quality issues should be covered by observability E2E and automated projection-fact reconciliation.
