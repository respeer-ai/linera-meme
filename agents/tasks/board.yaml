          再按 transaction_id 过滤。它仍消费 projection，但不是严格事件驱动，交易量增长后成本会随池历史线性增加。

          已完成：
          - 新增 projection query repo 方法按 `(pool_application, pool_id, transaction_ids)` 精确读取 settled trades
          - websocket transactions/kline 增量 payload 只读取当前事件涉及的交易
