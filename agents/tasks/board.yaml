  - name: Observability Incremental
    constraints:
      tdd:
        rule: Every task MUST follow TDD. Write the test first, verify it fails (red), implement until it passes (green), then refactor.
        test_command: cd service/kline && python3 -m pytest tests/<test_file>.py -x -v
        regression_check: python3 -m pytest tests/ -x -q --timeout=60
      economic_verification:
        rule: Tests MUST verify economic correctness against Uniswap V2 AMM formulas, not just database writes or function calls.
        requirement:
          - Each test scenario must specify concrete input values (reserves, amounts, total_supply, k_last).
          - Expected outputs must be independently computed using the same Uniswap V2 math formulas (mint_fee_attos, apply_swap, sqrt product).
          - The test asserts exact field-level equality between function output and independently expected value.
          - For end-to-end tests, feed a complete event sequence (pool creation → swaps → add/remove) and verify cumulative economic state after each event.
      full_replay_equivalence:
        rule: Full replay and incremental path MUST use the same apply_* functions. After refactor (OBS-INC-007/008), full replay output and incremental state must diff to zero for every field.
      independent_verification:
        rule: Each task must be independently verifiable. No task should require unmerged code from another task to pass its own tests.
      no_new_replay:
        rule: Do NOT introduce new full-history replay loops. All state updates go through the incremental apply_* functions. The only exception is the manual full-replay trigger (OBS-INC-009) which reuses the same apply_* functions.
