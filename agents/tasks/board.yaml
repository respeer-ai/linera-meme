        title: Investigate production K-line flattening after 03:00
        notes: |
          Focus on the production incident: the initial description was "zero since 03:00", later corrected to "no new candles after 03:00 and price stays flat".
          Current conclusions:
          - `/points` for active production pools 1000/1001/1002 did not return `close=0` after 2026-04-20 03:00 CST; it continued returning non-zero prices
