          - Linera gas unit prices are fixed by the current committee ResourceControlPolicy and do not fluctuate with time, congestion, or market state.
          - The existing estimate_gas path stages local block execution and currently returns only ResourceTracker.wasm_fuel.
          - ResourceTracker plus Resources::total_price is not a complete exact-fee model because Resources is a grant/budget structure and does not cover every ResourceController::track_* charge.
          - Full exactness depends on execution-time fee semantics including free app message handling, grants, refunds, rejected/bouncing messages, and blob fee waivers.
