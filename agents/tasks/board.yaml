          - 前端收到 `positions` 后重新拉 `/positions`、`/position-metrics`、必要 stats；
            HTTP/projection read model 仍是业务真值
          - candle finality 由后端统一提供，但 finality scheduler 只产生事件，不直接推 websocket
          - 禁止继续给 `Ticker` 增加新产品 realtime topic

