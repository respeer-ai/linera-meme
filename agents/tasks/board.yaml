      - id: POS-022
        status: Doing
        priority: P0
        depends_on: [POS-021]
        title: service/kline 新增 position metrics 接口
        notes: 已新增 /position-metrics，并接入 position 历史流动性记录、全池 transaction history 和开仓后池子 swap 计数；在当前锁定 virtual initial supply 语义下，无 swap 时无论是否 virtual initial liquidity 都可返回 exact principal=redeemable / fee=0；有 swap 时，现已支持“以用户最后一次流动性变更为基准，其之后池子再无任何 Add/RemoveLiquidity”的严格子集：若最后一次变更是 Add，则其之前通常不能有 swap；但若 owner 当前就是 fee_to，且 latest Add 之前 owner 净流动性为 0，则允许把 latest Add 时同步 mint 到 owner 的 protocol fee shares 识别为 fee 而非 principal，因此 fee-on 池子里 fee_to 本人开仓后也可返回 exact fee，不再一律 Unavailable。若最后一次变更是 Remove，则允许它之前已有 swap，并把这次 Remove 后的剩余仓位视为新的精确基准，因此已覆盖单次 Add、Add 后部分 Remove、swap 后 Remove 再继续持仓/继续被后续 swap 稀释、以及 fee_to owner 领取 protocol fee shares 的场景。实现基于当前 Uniswap V2 fee-on 语义重放 total_supply/reserve/k_last 历史，并用 fee-free counterfactual swap path 精确拆分 principal/fee；当记录历史在批次边界缺少一笔可由后续同批两笔 swap 唯一反推的 hidden swap 时，现也会把该隐含 swap 重建进 replay，而不再直接退化成 Unavailable。其余开仓后仍有流动性变更、latest Add 之前已发生 swap 且无法归因为 fee_to protocol mint、或历史无法重放的场景仍返回更具体 blockers。新增确认：当前费用卡住不只是算法子集不足，还暴露出两类底层问题需要并行处理：1) 金融数值精度链路仍有风险，`service/kline/src/async_request.py` 目前用默认 `json.loads`，若上游返回 JSON number 会先落成 Python float，必须改为 Decimal-safe 解析并继续排查 live GraphQL -> MySQL -> API 的全链路字符串/Decimal 传递；2) 已证明 `service/kline` 的历史同步存在 bug：ticker 曾把只保留最近 5000 条的 `latestTransactions(startId)` 当成历史修复来源，DB 一旦出现老内部缺口且该缺口已滑出 5000 窗口，就会永久留洞。现已改为保留“最近 5000 条仍可用于 recent backfill/增量同步”的事实，但不再把该接口冒充成全历史修复；同时已确认 accepted transaction history 不能假设 `transaction_id` 连续，因为上游 `Reject` 会合法消耗 id 但不会进入 `latestTransactions`，所以 `position-metrics` 和 ticker 诊断都不再把 id 跳号直接视为 incomplete history，而只保留 live-vs-DB 实际返回集合的差异诊断。现 `/debug/pool` 也可按需导出 DB 历史、owner liquidity history、gap summary、diagnostics，以及最近窗口 live-vs-DB transaction id 差异，便于直接定位生产缺口是否仍落在 recent 5000 内
      - id: POS-023
        status: Doing
        priority: P0
        depends_on: [POS-022]
        title: 前端接入真实 position fee 展示
        notes: 前端已切到消费 /position-metrics，不再使用 24h 成交量近似 fee；当前线上在 exact_fee_supported=false 时仍显示 `Syncing` 作为临时占位，但这不是最终语义。后续目标不是展示“不可计算”，而是在 POS-022/024 把底层精度和交易队列问题修到足以返回真实值或带轻微误差说明的值；在此之前不要引入与当前算法无关的 TVL/24h volume 近似
      - id: POS-025
        status: Doing
        priority: P0
        depends_on: [POS-022]
        title: position-metrics 改为与池历史长度无关的物化查询
        notes: 当前 /position-metrics 仍需按请求读取全池 transaction history 并重放，时间复杂度随池历史长度增长。目标仍是仅在 service/kline 侧实现写时物化和查询时常数级读取：为每个 pool 维护可增量更新的 live / fee-free 累积状态，为每个 owner+pool active position 维护“最近一次流动性变更”为 basis 的快照；查询时只读取 position basis snapshot 和 pool current snapshot，不再扫描全历史。当前已落第一版可执行 storage+read boundary：新增 `storage/mysql/position_state_snapshot_repo.py` 与 `storage/mysql/pool_state_snapshot_repo.py`，分别提供 `position_state_v2` / `pool_state_v2` schema、upsert、最小读取接口，并已接入 `app/bootstrap.py` 与 `app/lifecycle.py` 的 container/schema 初始化路径；又新增 `storage/mysql/position_state_projection_repo.py` 与 `storage/mysql/pool_state_projection_repo.py` 作为 read-side projection repo，并把 `storage/mysql/position_metrics_projection_repo.py` 扩展出 `get_position_basis_snapshot()` / `get_pool_state_snapshot()` 两个显式 snapshot 读取面。进一步又新增 `storage/mysql/position_metrics_snapshot_projection_repo.py` 作为 position-basis + pool-state 的组合读取边界，`LivePositionMetricsFetcher` 现已开始通过 `get_snapshot_inputs()` 拉取 shadow snapshot inputs，并把它们透传进 `enrich_payload` 的新可选参数通道，但当前主计算仍完全沿用旧的 history-replay 路径，不消费这些 snapshot inputs。新增进展：现已把第一版写时 snapshot materialization 真正接到 Layer 3 settled-output 持久化后面。新增 `storage/mysql/position_metrics_snapshot_source_repo.py` 作为 direct-MySQL source repo，新增 `market/position_metrics_snapshot_builder.py` 负责按受影响 pool / owner 重建 `pool_state_v2` 与 `position_state_v2`，并新增 `market/position_metrics_snapshot_materializer.py` 负责 replace/upsert 落库；`SettledMarketMaterializer` 和 `app/bootstrap.py` 已接线，因此每批 settled trade / liquidity change 写入后会立即触发一次 snapshot shadow rebuild。当前实现仍是“事件驱动下的重建式 materialization”，不是最终增量状态机，但它已经让 snapshot 真正开始随写入推进。为避免 shadow 路径反过来卡住主 ingestion，这条 snapshot materializer 被设计为 fail-open：重建失败只会让 snapshot 子路径降级，不会阻断 settled outputs 主持久化与 cursor 推进；同时 position snapshot 写入已补 `replace_position_states(owner, pool_application_id, states)`，避免平仓后残留 stale active snapshot。现又进一步把 shadow compare 接到 `/position-metrics` 查询链路：`LivePositionMetricsFetcher` 会在不改变主结果来源的前提下，对比 snapshot 与当前 replay 输入的结构一致性，并通过 `PositionMetricsHandler` 记录 `snapshot_shadow_gap` diagnostics。shadow 现在不再只有“是否 mismatch”，而是显式分类为 `candidate / snapshot_missing / structure_mismatch / financial_semantics_pending`；其中 `candidate` 表示结构已对齐且当前 replay 结果已无 exactness blockers，可作为后续子集 cutover 候选，`financial_semantics_pending` 则表示 snapshot 结构已足够稳定，但 fee/principal 语义仍未完全落入 snapshot 路径。与此同时，`GET /debug/pool` 现在也会直接导出 `position_basis_snapshot` 与 `pool_state_snapshot`，把 DB history、diagnostics 和当前 snapshot state 收敛到同一个排障入口；并且新增 `GET /debug/position-metrics/readiness`，可按 owner/status 实时跑当前 query stack，直接导出 readiness 分布和样本，从而在不把 candidate 常驻写入 diagnostics 表的前提下，观察“当前可切 snapshot 子集”的真实覆盖率。现在 readiness 输出还会额外聚合 `exact_case_counts`、`readiness_reason_counts`、`mismatch_code_counts`、`basis_profile_counts`、`current_round_liquidity_event_count_counts`、`current_round_trade_count_before_basis_counts`、`trade_count_between_basis_and_fee_free_basis_counts`、`exact_current_principal_case_counts`、`materialized_protocol_fee_split_case_counts`、`protocol_fee_split_semantic_counts` 与 `fee_to_continuity_case_counts`，把 exact 命中类型、remaining financial blockers、snapshot-vs-live 结构偏差、basis 形状、当前轮 liquidity event 次数、current round 在 latest basis 之前是否已经发生 swap、basis 与当前 fee-free basis 之间是否还夹着 swap、position-specific current-principal 物化分支，以及 fee_to 协议费拆分分支都提升成总量分布；同时样本也会直接给出 `protocol_fee_split_semantic`，把“安全恢复的连续 fee_to nonzero-prior-add exact 子集”“basis-only protocol-fee mint 已锚定的 nonzero-prior-add exact 子集”“历史 protocol-fee mint 已全部归当前 owner 的 exact 子集”“历史 protocol-fee 里当前 owner 那一部分已被单独证明且恰好等于 `live-tracked` 的 exact 子集”和“仍 unresolved 的 nonzero-prior-add 子集”在 debug 面上显式区分，便于直接据此判断下一批 cutover 应优先扩哪类 exact 子集，或先修哪类结构问题，而不必先翻明细样本。现在真实 snapshot-backed read cutover 已覆盖“latest liquidity basis 之后再无 liquidity 变化”的核心 exact 子集：`active + fee_free_basis_transaction_id=basis_transaction_id + fee_free_basis_time_ms=basis_time_ms`。其中既支持 `latest basis_type=add_liquidity + basis_time_ms=opened_at`，也支持 `latest basis_type=remove_liquidity`；若 basis 之后完全无后续交易，则直接 principal=redeemable / fee=0；若 basis 之后只有 swap、没有后续 liquidity 变化，则 snapshot builder 会在 `pool_state_v2` 里额外物化 fee-free current reserves/total supply，`PositionMetricsSnapshotFastPath` 可直接用 `redeemable - fee_free_principal` 精确拆分 fee/principal，而无需请求期 replay 全池历史。进一步地，position snapshot payload 现还会物化 `prior_liquidity_before_basis`，并新增 `basis_opens_current_round`、`has_only_zero_liquidity_before_basis`、`current_round_liquidity_event_count`、`current_round_started_at`、`current_round_started_transaction_id`、`current_round_trade_count_before_basis` 与 `trade_count_between_basis_and_fee_free_basis`，因此除了 `fee_to owner + latest add + prior zero` 这条 replay 已验证的 exact 子集之外，现在也能接受两类 `opened_at` 早于 basis 的当前轮开仓场景：1) basis 之前只有 zero-liquidity bootstrap、并未真正持仓；2) owner 之前在该池子中曾完整清仓，latest add 之前净流动性已经回到 0，即 reopen-from-zero。只要 snapshot builder 明确把 latest basis 标记为 `basis_opens_current_round=true`，fast path 就会把这轮 basis 视为当前仓位的真实起点，而不再被 legacy `/positions` 的最早 `opened_at` 卡住；这条路径现已同时覆盖 `fee_to` 和非 `fee_to` owner，且已覆盖 basis 后无后续交易以及 basis 后仍有 swap、但无后续 liquidity change 的情况。当前仍不会仅凭 latest add basis 本身放开“prior liquidity before basis 非零且 basis 前已有 swap”的一般场景，但当 `exact_current_principal` 已经物化出来时，这个旧限制也不再阻断 fast path，因为 query 已经不再依赖“latest add 就是当前轮真实起点”的假设；于是 `latest add after prior current-round swaps` 这类 previously rejected 场景，现在只要 materialized current principal 存在，也能切到 snapshot exact path。除此之外，当前 snapshot fast path 现在还新增覆盖了一个此前未覆盖、但可精确回答的 add-basis 子集：`latest basis = AddLiquidity`、`prior_liquidity_before_basis > 0`，但 current round 从起点到 latest basis 之前没有发生任何 swap。此时即使 latest add 不是当前轮第一笔 liquidity change，current round 里旧 shares 在 latest basis 前也还没有累积 fee，因此整笔 tracked liquidity 仍都可视为 principal，fast path 可以安全直接返回 exact 结果，而不必退回 replay。并且对 `fee_to owner + nonzero prior add basis + materialized current principal`，如果当前 `live_liquidity == tracked_liquidity`，说明当前并不存在需要拆分的 protocol-fee LP，于是也会直接允许 exact path，而不再被 fee_to 语义额外挡住。当前又进一步覆盖了“position basis 之后发生了后续 pool liquidity change，但从该 basis 到当前 `fee_free_basis` 之间没有任何 swap”的 exact 子集：builder 会为 position snapshot 物化这段桥接区间的 swap count，fast path 则允许 `basis != fee_free_basis`，只要该计数为 0，就直接复用当前 fee-free state 常数级求得 exact principal/fee，而无需回退全历史重放。为便于继续扩大 cutover 覆盖率，snapshot exact 命中现在还会在 internal shadow/readiness 路径上打出 `exact_case`，并可结合 `basis_profile_counts + current_round_liquidity_event_count_counts + current_round_trade_count_before_basis_counts + trade_count_between_basis_and_fee_free_basis_counts` 直接看当前 exact/pending 分布主要集中在哪类 basis、当前轮是否已有多次 liquidity change、latest basis 之前是否已经发生 swap、以及 basis 与 fee-free basis 之间是否还夹着 swap。命中时 `LivePositionMetricsFetcher` 会直接走 `PositionMetricsSnapshotFastPath`，不再加载 liquidity/pool history，而是用 live redeemable + snapshot 直接返回精确结果；其余场景仍继续走 replay + shadow compare。当前又进一步把一个 position-specific 的写时物化状态接进 snapshot：builder 会在可精确离线重放的前提下，把 `exact_current_principal` 直接写入 position snapshot，query fast path 则在 `basis` 与当前 `fee_free_basis` 之间已发生 swap 时优先消费这份物化结果。第一版只放开了严格子集：post-basis liquidity changes 仅包含 `AddLiquidity`，不包含 `RemoveLiquidity`；这样在不引入全量 LP counterfactual 余额跟踪的前提下，就能把“intervening swaps + later adds”这条路径也切到常数级 exact query。当前又新增 `materialized_protocol_fee_split_case` 内部观测字段，把 `owner_not_fee_to`、`fee_to_opening_add_from_zero`、`fee_to_latest_remove_basis`、`fee_to_materialized_nonzero_prior_add_basis` 与 `fee_to_nonzero_prior_add_basis_unresolved` 从隐式分支提升为显式 shadow/readiness/debug 语义，先把剩余 `fee_to + nonzero prior add basis` 缺口稳定暴露出来，供后续是否继续 cutover 或引入更细 fee provenance 约束时直接使用。进一步地，出于 exactness 安全性，当前已把 `fee_to owner + materialized current principal + latest add basis + prior_liquidity_before_basis > 0` 这条仍缺 protocol-fee provenance 的路径从 snapshot exact fast path 中移除，不再依赖 `(live_liquidity - tracked_liquidity) / live_liquidity` 做乐观拆分；这类场景现在会回退到 replay/fallback 路径，并在 shadow/readiness 中通过 `materialized_protocol_fee_split_unresolved` blocker 显式标记，直到后续真正把更细的 protocol-fee provenance 物化进 snapshot builder 为止。当前又把 pool replay 已知的 protocol-fee LP provenance 接进了写时物化：`PositionMetricsPoolHistoryReconstructor` 现在会为每个 liquidity event 状态记录 `protocol_fee_minted_after`，`PositionMetricsSnapshotPrincipalSimulator` 则会把 `basis_protocol_fee_liquidity_minted`、`post_basis_protocol_fee_liquidity_minted`、`post_basis_protocol_fee_mint_event_count`、`post_basis_protocol_fee_liquidity_minted_before_first_add`、`fee_to_continuous_protocol_fee_liquidity_current` 与 `protocol_fee_liquidity_provenance_case` 一并写入 `exact_current_principal`，query shadow/debug 也已暴露这些字段。随后又把 `fee_to` 连续性历史接进 snapshot：source repo 会从 `normalized_events` 读取 `pool_set_fee_to_message_observed`，builder 会把 `fee_to_continuity` 物化进 position snapshot，并在 query shadow/debug 中暴露 `continuity_case / fee_to_account_at_basis / fee_to_account_latest_known / change_count_after_basis`。在此基础上，当前已先安全恢复两个更窄的 exact 子集：1) 对于 `fee_to owner + latest add basis + prior_liquidity_before_basis > 0`，若 `fee_to_continuity.continuity_case=continuous_no_changes_after_basis`、`fee_to_account_at_basis == fee_to_account_latest_known == owner`，且 `tracked_liquidity + fee_to_continuous_protocol_fee_liquidity_current == live_liquidity`，fast path 会重新放行并用物化的 protocol-fee liquidity 做精确拆分；2) 即便 continuity 不连续，只要 protocol-fee provenance 已明确是 `basis_only_mints`，且 `known_before_basis=true`、`fee_to_account_at_basis == owner`、`tracked_liquidity + basis_protocol_fee_liquidity_minted == live_liquidity`，也会作为新的安全 exact 子集放行。现在又进一步把“protocol-fee mint 归属证明”本身物化进 snapshot：builder 额外写入 `protocol_fee_current_owner_provenance_case`、`protocol_fee_liquidity_owned_by_current_owner_current`、`protocol_fee_liquidity_owned_by_other_accounts` 与 `protocol_fee_liquidity_owner_unknown`。先新增了一个更窄的 exact 子集：只要全部已知 protocol-fee mint 都能证明归当前 owner，且 `tracked_liquidity + protocol_fee_liquidity_owned_by_current_owner_current == live_liquidity`，query 即使在当前 `pool.fee_to` 已经切到别人的情况下，也能继续走 snapshot exact path，而不必因为 `owner_is_fee_to=false` 退回 replay。现在又进一步把它放宽到一个更通用、但仍然严格的 exact 子集：即使同时存在“当前 owner 持有的 protocol-fee mint”和“其他账户持有的 protocol-fee mint”，只要当前 owner 已证明持有的那一部分 protocol-fee liquidity 恰好等于 `live_liquidity - tracked_liquidity`，就说明这笔 position 自身的 fee component 已被完整钉死，仍可安全走 snapshot exact path，而无需要求“所有 protocol-fee mint 都归当前 owner”。并且这条 ownership-proven exact 子集现在不再局限于 later-add 场景；它也已覆盖 `post_basis_remove_count > 0` 的 fee-to owner materialized-current-principal 路径，因为这时 principal 已由 snapshot 精确物化，protocol-fee split 也已由 ownership proof 钉死，继续额外卡 `basis_type` 或 `prior_liquidity_before_basis` 已经没有数学必要。其余 nonzero-prior-add fee_to 场景仍继续降级，不会重新引入比例猜测。相关 snapshot builder/materializer/repo/query-stack/position-metrics/debug-pool/readiness-debug/fast-path 单测已补齐并通过。该任务只涉及 kline/MySQL/同步逻辑与接口实现，不修改 pool/swap 合约侧语义
      - id: POS-026
