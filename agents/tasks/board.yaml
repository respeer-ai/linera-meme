          本任务剩余重点不再是补 projection payload，而是把仓位相关依赖继续收紧到 projection-only：
          - 清理产品路径残留 fallback / dead projection wiring
          - virtual positions / protocol fee receiver 语义继续只由 parse-block 后的 snapshot + projection 合成
          - pool catalog 的生产侧改为 parse-block 驱动，避免 consumer 再依赖历史 query-service 写入
