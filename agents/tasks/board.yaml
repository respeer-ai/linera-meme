      - id: POS-032
        status: Doing
        priority: P0
        depends_on: [POS-031]
        title: 实现 Layer 1 block ingestion 与 cursor
        notes: 按 `chain_id + height` 顺序抓取、落库和推进 `chain_cursors`；支持补拉、重放、重启恢复；重复拉取必须由数据库唯一键保证幂等；失败不得部分推进 cursor。当前已把 phase-1 骨架推进到可执行且带基本安全约束的 ingest：`IngestionCoordinator` 现会执行 `mark_attempt -> fetch_block -> parse -> ingest_block -> mark_failure`，并在失败路径补写 `raw_block_ingest_runs.failed`，成功路径则与单块事务一起原子写入 success run；其中“目标高度尚未在 node service 上可见”已从通用失败里剥离为 typed stop condition，不再污染 `mark_failure` 或失败 run。中间新增了 `LayerOneBlockParser` 作为 Layer 1 block payload 到本地 raw-ingest shape 的稳定边界，以及 `LineraGraphqlChainClient` 作为真实 query client 协议实现起点；`RawRepository` 已支持 `chain_cursors` 读取/attempt/failure、`ingestion_anomalies` upsert，以及 `raw_blocks + raw_incoming_bundles + raw_posted_messages + raw_operations + raw_outgoing_messages + raw_events + raw_oracle_responses + chain_cursors + raw_block_ingest_runs` 的单块提交路径，并将 ingest summary 收敛到 canonical JSON。新增进展：现已按本地 `linera-protocol` 的真实 GraphQL schema 对齐 client/query 形状，不再假设不存在的 `block(height)` 接口；client 现在通过 `block(chainId)` 取 tip、`blocks(from, chainId, limit)` 逆向扫描 header，再以 `block(hash, chainId)` 拉取完整 `ConfirmedBlock`，同时增加了 per-chain tip/header cache，使连续按高度 catch-up 时可以复用已拉到的 header window，而不必每个目标高度都从 tip 重新逆扫；parser 也已能把真实 `status/hash/block{header,body}` envelope 展平成本地 raw block / bundle / message / operation / event / oracle-response 结构，并补了对应单测与 bootstrap/test-isolation 回归。另已新增 `ChainCursorStore`，把 repository 行数据映射为 ingestion 域内 `ChainCursor` 对象；`CatchUpRunner` 已支持 `max_blocks` 限制和“追平即停止”的单链批量推进；其上层又新增了可配置的 `CatchUpDriver`，可按配置链列表顺序执行 multi-chain bounded catch-up 并返回聚合结果，bootstrap 已接线。新增约束：driver 不是 cron 入口，目标是由 startup reconcile、subscription reconnect、lag/gap detection、或显式 admin repair 驱动；当前这几个触发点里，显式 admin repair 已通过 `POST /debug/catch-up/run` 落地，startup reconcile 也已通过 `AppLifecycle.startup()` 对配置链自动执行一次 bounded catch-up 落地，且保留了 startup 开关；同时已新增 `ChainEventProcessor` 作为“链收到新区块通知后触发 bounded catch-up”的通知入口边界，bootstrap 已接线；现在又补上了真实 `LineraGraphqlNotificationListener`，通过 `graphql-transport-ws` 订阅 `notifications(chainId)`，在任意链通知时触发 bounded catch-up，并在断线重连后先执行 reconnect reconciliation 再恢复实时通知，整个主路径保持事件驱动而非 cron。进一步地，`ChainEventProcessor` 现在会对同一条链串行化处理通知，并在单次触发中持续执行多批 bounded catch-up 直到真正 `caught_up`，把 lag recovery 也收敛到同一个事件驱动入口，而不再依赖额外 cron；同时 `RawRepository` 已补齐 `chain_cursors`、recent ingest runs、open anomalies 的只读查询，`service/kline` 也新增了 `GET /debug/observability`，可以直接导出 Layer 1 的 cursor/run/anomaly 诊断面。canonical fingerprint 现在也从散落的 `str(...)` / ad-hoc JSON 收口为统一 `CanonicalFingerprint`，支持 canonical JSON/bytes 两种稳定表达，`raw_block_bytes` fallback、anomaly `details_json`、ingest summary 与 child-row conflict 比对都已统一走这一层；此外 bundle/message/operation/outgoing-message/event/oracle-response 的内容冲突也都会落成显式 anomaly，而不再只是抛出通用异常。新增活性检查点：当前实现虽然已具备 event-driven catch-up 和诊断导出，但还未满足“observability fail-open”要求，因为 runtime 仍内联在 `service/kline` startup 和 debug 请求初始化路径中，raw schema / startup catch-up / listener 任一失败都可能拖垮主服务活性；在这个约束满足前，本任务只算 skeleton 可运行，不算可安全并入主服务。现阶段仍缺的主要是：先把 observability runtime 从主服务 startup 关键路径剥离为 fail-open 子生命周期，再视需要继续扩展 anomaly 分类与告警语义，并把 Layer 1 数据进一步接入后续 decoder/normalizer 层。模块接口、cursor 和 replay 语义见 `agents/primitives/observability-interfaces.md`；block-atomic 事务顺序、冲突异常和 downstream cursor 细则见 `agents/primitives/observability-layer1-ops.md`；交付物与验收见 `agents/runbooks/observability-deliverables.md`
      - id: POS-042
        status: Doing
        priority: P0
        depends_on: [POS-032, POS-036]
        title: 重构 observability 为单进程内 fail-open 子生命周期
        notes: 在不拆分进程、不拆分服务的前提下，把 observability 从当前 `service/kline` 的 startup 阻塞依赖改成同进程内独立失败域的核心子系统。目标不是移除 observability，而是让 query serving 与 observability runtime 生命周期解耦：query/ticker 必须优先启动并保持可服务；observability 的 raw schema、startup catch-up、notification listener、trace/debug 写入、admin repair 任一失败都只能让 observability 自身进入 degraded，而不能阻断主 API startup 或 steady-state serving。当前已完成五轮骨架落地：1) 新增 `app/observability_status.py` 定义 `disabled/stopped/starting/ready/degraded` 状态机，并继续细化为 component-level status，能区分 `schema / registry / startup_catch_up / listener / debug_export`，同时预留 `decode_scheduler / normalizer / market_deriver` 三个 future-worker 组件，确保 POS-033/034/035 进入时必须复用同一状态面；2) 新增 `app/observability_runtime.py` 包装现有 bootstrap+lifecycle+catch-up handles，并把启动拆成 stage-by-stage 执行与结果汇总，而不是黑盒成败；3) 新增 `app/observability_supervisor.py` 负责状态流转、异常收口、best-effort start/stop、显式 catch-up 调度，并把 stage 结果映射到组件级 degraded surface；4) 新增 `app/observability_facade.py` 给 endpoint 提供稳定调用面，并进一步输出 `operator_actions`，把“当前应该做什么恢复动作”直接随状态一起返回；5) 删除 `kline.py` 里的 `_ensure_observability_runtime()` 隐式 lazy bootstrap，把 startup 改为后台 `best-effort start_if_configured()`；6) 把 `/debug/observability` 与 `/debug/catch-up/run` 改成只读/只调度 supervisor，不再隐式冷启动 runtime；7) 新增显式 `POST /debug/observability/recover` 恢复入口，允许运维在不重启整个 query 进程的前提下重试 observability 子生命周期；8) debug 读取自身若失败，也只会把 observability 标成 degraded 并返回状态面，而不会让 debug/diagnostics 继续放大故障；9) 已新增 `agents/runbooks/observability-fail-open-operations.md`，把 fail-open 状态语义、组件级恢复动作和 recover/catch-up 操作顺序固化为 runbook，并明确 future workers 不能另起 health/recovery 协议；10) 已补 targeted tests，覆盖 startup fail-open、组件级 degraded 可见性、debug 面不再依赖冷启动、catch-up 失败转 degraded、recover 入口、debug export failure 的局部降级、operator-actions 输出，以及 planned worker boundary 输出。当前剩余工作已收缩到很小：继续推进 POS-033/034/035 时保持这套 operator-facing surface 不被绕开，并在真正引入 worker 实现时把 `planned` 组件转为真实运行状态；在此之前，不继续把 decoder/Layer 2/Layer 3 深化实现塞进旧耦合结构
      - id: POS-033
        status: Doing
        priority: P0
        depends_on: [POS-042]
        title: 设计 application registry 与 decoder registry
        notes: 为 `pool` / `swap` / `meme` / `proxy` / `ams` / `blob-gateway` 建立 app 类型注册与 decoder 选择规则；`application_registry` 是持久数据，`decoder_registry` 是进程内代码注册；raw 层保留 bytes，decode 失败不阻断 ingestion。当前已从纯骨架推进到可执行 discovery+dispatch+decode-worker 主干：1) 已落地持久化 `application_registry` 表及其 MySQL repo，包含 `application_id/app_type/chain_id/creator_chain_id/owner/parent_application_id/abi_version/discovered_from/status/metadata_json` 基础列，并在 bootstrap/lifecycle 中接线；2) `ApplicationRegistry` 已支持静态 seed、显式 known-application 注册、按类型 list，以及 `discover_application` 的 source/status 合法性校验，先把 `static_config / swap_service / proxy_service / chain_event / manual` 和 `active / unknown / deprecated` 这套 contract 固定下来；当前 static seed 已覆盖 `swap` 和 `proxy` application；3) `DecoderRegistry` 已支持显式 known pair 注册，使 `pool/swap/meme/proxy/ams/blob-gateway` 的 `operation/message` 组合可以以 `implemented=false` 的形式稳定暴露，而不是“缺席即未知”；4) 已新增 `DecoderDispatcher`，把 persistent `application_registry` 和 in-process `decoder_registry` 串起来，显式产出四类结果：`unresolved_application / unimplemented_decoder / decode_failed / decoded`，从而把 POS-033 的调度语义先做实；5) decode result 现也已固定 `decoder_version` 字段，支持 decoder 通过 `decoder_version()` 或 `VERSION` 暴露版本提示，为后续 re-decode 和 diagnostics 做准备；6) 已新增 `SwapCatalogClient + ProxyCatalogClient + ApplicationDiscoveryService`，并把它们接到 bootstrap/lifecycle/observability runtime 的 registry stage 中，使系统能从 swap `pools` catalog 自动发现 `pool` applications、从 proxy `memeApplications` 自动发现 `meme` applications，并写入 `application_registry`；这些 discovery 失败时只会把 observability 的 `registry` 组件标成 degraded，不会破坏 query 活性；7) 已新增真实 decoder 并接线：`BlobGatewayOperationDecoder`、`ProxyOperationDecoder`、`AmsOperationDecoder`，以及新增的 `SwapOperationDecoder + SwapMessageDecoder`、`MemeOperationDecoder + MemeMessageDecoder`；目前它们都经由 Rust canonical decoder 执行真实 ABI/BCS 解码，而不再由 Python 重写复杂 payload 结构；8) 已新增 `DecodeScheduler` 契约对象，把 `raw_fact_id/raw_table/application_id/payload_kind/raw_bytes` 统一映射为 decode work item，并产出稳定的 decode result envelope，为后续 POS-034 normalizer 接入提供边界；9) bootstrap 现已接入 `decoder_dispatcher`、`decode_scheduler` 与 `application_discovery_service`。新增实现约束：复杂 ABI/BCS payload 不再以 Python 手写 field-level BCS 作为长期方案；当前 `pool + operation/message`、`swap + operation/message`、`meme + operation/message`、`proxy + operation`、`ams + operation`、`blob-gateway + operation` 都已切到 Rust canonical decoder，由 Python 通过薄 adapter 调用，保留单服务/单进程编排边界，同时把真实解码语义收口到 Rust ABI 类型，旧的 Python `BcsReader` 已从主路径移除。当前仍未把更多来源自动扩充 registry 到真实 `ams` / `blob-gateway` 实例，也还未覆盖所有 future app type。下一步优先把这些 canonical decode 结果进一步接到更细的 Layer 2 business families / Layer 3 market semantics，并继续把现有 `DecodeScheduler` 输出接到后续 normalize contract。模块接口见 `agents/primitives/observability-interfaces.md`；规范见 `agents/primitives/application-decoding.md` 与 `agents/runbooks/observability-deliverables.md`
