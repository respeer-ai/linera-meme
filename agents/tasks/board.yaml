  - name: Funds Consistency
    tasks:
      - id: FUND-001
        status: Doing
        priority: P0
        depends_on: []
        title: 定义跨链资金一致性协议边界与状态机
        notes: 先收口协议边界，再分实现。已确认：1) `transaction_id` 不连续本身不是异常，只有某笔已 `Reject` 或下游失败的交易仍残留 reserve / total supply / share / 资金副作用，才算真实不一致；2) Linera Wasm 合约里 native `transfer` 失败不可在合约内 catch，也拿不到可恢复的 fail 返回，因此不能依赖“payout fail 回执”修复；3) 跨链消息无法原子，meme 输入链与 pool payout 链之间必须显式建模 pending / success-only completion / user-claim or escrow 类语义，不能继续假设“先入池再异步出款失败可自动回滚”；4) virtual liquidity、真实 reserve、可支付余额三者语义必须一并收口；5) Linera `tracked + bouncing` 应作为原生的一跳 reject receipt 机制纳入协议设计，用于把“目标链 reject”可靠反馈回源链并收敛 `pending -> failed/refund-ready`，但它只覆盖单跳消息，不能替代多跳业务流程的显式状态机。该任务输出协议定义：哪些阶段可持久化、哪些阶段只能 pending、哪些资金在成功前不得最终归 pool 所有、哪些消息必须 tracked、bounce 回来后如何幂等收敛，以及 claim/refund/commit 的幂等边界
      - id: FUND-002
        status: Todo
        priority: P0
        depends_on: [FUND-001, REV-001]
        title: 按统一协议修复 pool/swap 异步资金闭环
        notes: 合并原先分散 TODO，一次性覆盖高风险路径：AddLiquidity 双腿部分成功后失败无退款；swap/remove/refund/payout 对下游 meme/native 发放缺少可靠闭环；初始建池路径吞掉下游失败仍持久化成功；`NewTransaction` 或其他后续消息 `Reject` 后仍残留资金/状态副作用。实现目标不是在合约内捕获 host transfer panic，而是让失败最多留下可验证的 pending，不留下错误 finalized 状态，并为成功路径补齐显式确认、幂等键与状态收敛。实现约束：优先利用 Linera `tracked + bouncing` 承接关键单跳消息的 reject 回执与源链收敛，但不能把它误当成全流程原子回滚；后续 hop 的失败仍必须由业务协议状态机显式处理
      - id: FUND-003
        status: Todo
        priority: P0
        depends_on: [FUND-001]
        title: 明确 gas/funder 覆盖与链级运行保障
        notes: `funder` OOM 已证明 chain gas 不足会直接打断任何可靠协议推进，这条线需要和资金一致性并行治理。需要定义必须持续充值的链集合与覆盖来源，确认包含预创建链和运行期新增链；落实 `funder` 资源、链发现、监控告警与人工诊断接口，避免再次出现 chain balance 耗尽但 application balance 仍在、导致表面看像资金一致性故障的情况
      - id: FUND-004
        status: Todo
        priority: P1
        depends_on: [FUND-002]
        title: 为资金协议与失败收敛补回归测试
        notes: 覆盖部分成功退款、pending 不 finalize、重复 success/commit/claim 幂等、初始建池下游失败、Reject 后无残留副作用，以及 virtual liquidity 与真实可支付余额边界
