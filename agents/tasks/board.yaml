      - id: POS-022
        status: Doing
        priority: P0
        depends_on: [POS-021]
        title: service/kline 新增 position metrics 接口
        notes: 已新增 /position-metrics，并接入 position 历史流动性记录、全池 transaction history 和开仓后池子 swap 计数；在当前锁定 virtual initial supply 语义下，无 swap 时无论是否 virtual initial liquidity 都可返回 exact principal=redeemable / fee=0；有 swap 时，现已支持“以用户最后一次流动性变更为基准，其之后池子再无任何 Add/RemoveLiquidity”的严格子集：若最后一次变更是 Add，则其之前通常不能有 swap；但若 owner 当前就是 fee_to，且 latest Add 之前 owner 净流动性为 0，则允许把 latest Add 时同步 mint 到 owner 的 protocol fee shares 识别为 fee 而非 principal，因此 fee-on 池子里 fee_to 本人开仓后也可返回 exact fee，不再一律 Unavailable。若最后一次变更是 Remove，则允许它之前已有 swap，并把这次 Remove 后的剩余仓位视为新的精确基准，因此已覆盖单次 Add、Add 后部分 Remove、swap 后 Remove 再继续持仓/继续被后续 swap 稀释、以及 fee_to owner 领取 protocol fee shares 的场景。实现基于当前 Uniswap V2 fee-on 语义重放 total_supply/reserve/k_last 历史，并用 fee-free counterfactual swap path 精确拆分 principal/fee；当记录历史在批次边界缺少一笔可由后续同批两笔 swap 唯一反推的 hidden swap 时，现也会把该隐含 swap 重建进 replay，而不再直接退化成 Unavailable。其余开仓后仍有流动性变更、latest Add 之前已发生 swap 且无法归因为 fee_to protocol mint、或历史无法重放的场景仍返回更具体 blockers。新增确认：当前费用卡住不只是算法子集不足，还暴露出两类底层问题需要并行处理：1) 金融数值精度链路仍有风险，`service/kline/src/async_request.py` 目前用默认 `json.loads`，若上游返回 JSON number 会先落成 Python float，必须改为 Decimal-safe 解析并继续排查 live GraphQL -> MySQL -> API 的全链路字符串/Decimal 传递；2) 已证明 `service/kline` 的历史同步存在 bug：ticker 曾把只保留最近 5000 条的 `latestTransactions(startId)` 当成历史修复来源，DB 一旦出现老内部缺口且该缺口已滑出 5000 窗口，就会永久留洞。现已改为保留“最近 5000 条仍可用于 recent backfill/增量同步”的事实，但不再把该接口冒充成全历史修复；同时已确认 accepted transaction history 不能假设 `transaction_id` 连续，因为上游 `Reject` 会合法消耗 id 但不会进入 `latestTransactions`，所以 `position-metrics` 和 ticker 诊断都不再把 id 跳号直接视为 incomplete history，而只保留 live-vs-DB 实际返回集合的差异诊断。现 `/debug/pool` 也可按需导出 DB 历史、owner liquidity history、gap summary、diagnostics，以及最近窗口 live-vs-DB transaction id 差异，便于直接定位生产缺口是否仍落在 recent 5000 内
      - id: POS-023
        status: Doing
        priority: P0
        depends_on: [POS-022]
        title: 前端接入真实 position fee 展示
        notes: 前端已切到消费 /position-metrics，不再使用 24h 成交量近似 fee；当前线上在 exact_fee_supported=false 时仍显示 `Syncing` 作为临时占位，但这不是最终语义。后续目标不是展示“不可计算”，而是在 POS-022/024 把底层精度和交易队列问题修到足以返回真实值或带轻微误差说明的值；在此之前不要引入与当前算法无关的 TVL/24h volume 近似
      - id: POS-025
