      - id: POS-038
        status: Done
        priority: P0
        depends_on: [POS-035, POS-036, POS-042]
        title: 实现 positions 的 phase-1 read model
        notes: |
          已落 `query.read_models.positions`、对应 handler 与 serializer，并把 `/positions` 切到新查询栈。
          当前 `ProjectionRepository.get_positions()` 与 `PositionMetricsProjectionRepository.get_positions()` 都已只走 `settled_liquidity_projection_repo`，不再回退 `Db.get_positions`。
          当前硬约束进一步收紧：仓位存在性、虚拟初始仓位、protocol fee receiver 等业务语义必须只来自 parse-block 后的 projection，
          不允许再用 live pool/swap/wallet query 决定业务真值。Canonical 见 `agents/context/observability-architecture.md`。
