      - id: POS-053
        status: Done
        priority: P0
        depends_on: [POS-035, POS-037, POS-038, OBS-E2E-001]
        title: Refactor realtime push into projection event queue
        notes: |
          Goal: move realtime push from `Ticker.run` 10s polling to the data-platform event stream.

          Current design conclusions:
          - WebSocket push belongs to the data-platform consumption layer and must be driven by Layer 3 projection commits or projection-derived finality events
          - Use multi-producer, single-consumer fan-out to many clients:
            - producer: market derivation commit、replay/catch-up rebuild notification、candle finality scheduler
            - queue: in-memory async market-data event queue
            - consumer: event publisher drains/coalesces and pushes through WebSocketManager
          - `transactions` is a whole-market feed and is pushed to all connections by default
          - `kline` is filtered by pool / pair / interval subscription
          - `positions` adds a topic and notification; value is batch invalidation, not single-position truth
          - After receiving `positions`, the frontend refetches `/positions`, `/position-metrics`, and required stats; HTTP/projection read models remain business truth
          - candle finality is provided uniformly by the backend, but the finality scheduler only produces events and does not push websocket directly
          - Do not add new product realtime topics to `Ticker`

          Current split:
          - POS-054: market-data event types, queue, and publisher infrastructure are established
          - POS-055: Layer 3 market derivation commit is wired to event producer
          - POS-056: `positions` websocket topic and frontend auto-refresh are implemented
          - POS-057: candle finality scheduler is extracted while preserving backend-owned `is_final`
          - POS-058: legacy `Ticker` main runtime path and implementation are removed

          Validation:
          - `python3 -m compileall -q service/kline/src`
          - `python3 -m unittest service/kline/tests/realtime_payload_builder_test.py service/kline/tests/market_data_event_sink_test.py service/kline/tests/market_data_event_publisher_test.py service/kline/tests/subscription_test.py service/kline/tests/kline_service_lifecycle_test.py service/kline/tests/market_derivation_worker_test.py service/kline/tests/kline_runtime_test.py service/kline/tests/positions_api_test.py`
          - `bun test src/stores/kline/liveUpdate.test.ts`
          - `bun run build`
          2026-05-12 addition: market-data queue supports safe asyncio consumer wakeup from cross-thread producers, and `/debug/realtime` diagnostics with TTL/max-row quotas was added to locate enqueue->publish->payload->notify latency.
