          - runtime guard tests 已覆盖 stats/protocol stats 不回退 legacy `Db.get_*`
          - 剩余结构性问题是 `ProjectionPoolCatalogRepository` / metadata resolver 仍临时通过 legacy
            `pools` 表取得 numeric `pool_id` bridge；生产侧需要改成 parse-block-driven pool catalog
            或重新定义 public API identity，不能从 `pool_created` 事件伪造 pool_id
          已推进：
          - 新增 `pool_catalog_v2` projection，由 observed `swap_pool_created_recorded` /
            `swap_user_pool_created_recorded` normalized events 物化
          - `ProjectionPoolCatalogRepository` / metadata resolver / product read repos 已改读 projection catalog，
            不再读 legacy `pools` 表
          - `pool_catalog_v2.pool_id` 明确为 read-model stable id，不宣称是 swap GraphQL `poolId`
          已完成最终收口：
