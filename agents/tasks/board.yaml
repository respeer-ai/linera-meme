        notes: 已移除未生效的 protocol_fee_percent_mul_100，当前锁定为固定 Uniswap V2 fee-on 语义；swap 输出改为 constant-product with input-side fee，swap invariant 改为基于真实 amount_in/out 校验，非零 total_supply 的 add-liquidity mint 改为按 fee mint 后 total_supply 和现有 reserve 比例计算；同时修正 k_last 不再在 swap 时刷新，并让 remove_liquidity 也会结算 mint_fee 和更新 reserves。`validate_swap_invariant` / `mint_protocol_fee` / `update_k_last` 已从 StateInterface 顶层 helper 收回到 swap/add/remove 主流程，只保留 Pool 纯数学函数。pool service 的 `totalSupply` / `liquidity(owner)` / `calculate_amount_liquidity` 查询现已按 pending protocol fee 稀释后的 effective total supply 返回，避免把尚未 mint 的 protocol share 错算进用户可提资产；并新增了真实集成级 GraphQL 回归来断言 swap 后 `totalSupply/liquidity(owner)` 已体现 pending fee 稀释，不过该集成测在当前环境执行仍会被 Wasmer 模块实例化阶段的 os error 12 卡住，只能先完成 no-run 编译校验并依赖轻量 service 单测验证语义。virtual initial liquidity 现已转为锁定初始 supply，不再把初始储备注入首个真实 LP；contract 回归已覆盖初始 user liquidity=0、首次 add 后 user liquidity<total_supply、用户清空自身 LP 后池子仍保留锁定 supply/reserve。另已开始修正 `NewTransaction` 历史写入的内容级去重问题，改为预分配稳定 transaction_id 以保留真实重复交易，同时仍对重复消息投递保持幂等；当前代码和测试已表明“同内容但不同 transaction_id”的真实交易应被保留，但仍需核验线上坏历史是否来自旧版本遗留，以及 async 闭环在 `NewTransaction` 前中断时是否造成永久历史缺口；受限内存下 Wasmer 集成测仍需单独环境验证
