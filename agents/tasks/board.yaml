      - id: FUND-001
        status: Todo
        priority: P0
        depends_on: []
        title: 审计 Reject 后残留资金与 reserve 副作用
        notes: 术语约束：`transaction_id` 不连续本身不是缺记录，也不自动表示异常；只有当某笔已 `Reject` 的交易仍然影响了 pool 状态、资金、reserve、total supply、share 或其他副作用时，才定义为“状态不一致 / 不变量被破坏”。已确认存在这样一类严重一致性问题：`NewTransaction` 自消息若被 `Reject`，该笔交易不应成立；若此前已经扣款、改变 reserve、改变 total supply 或产生其他状态副作用，则必须回滚或走显式退款补偿。后续任务包含两部分：1) review pool/swap 及相关异步消息链路，排查是否还有其他 `Reject` / 下游失败 / 部分成功后导致状态不一致的路径；2) 设计并落地修复方案，明确每个阶段的原子边界、失败补偿、幂等语义与回归测试，确保失败交易要么完全不生效，要么用户与池子状态都进入可验证的一致结果
