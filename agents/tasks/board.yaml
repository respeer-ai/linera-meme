        title: 删除 legacy Ticker
        notes: |
          当前 `Ticker` 同时承担 10s 轮询、pool catalog 读取、projection transaction history 读取、
          kline payload 构造、transactions feed 推送和 candle rollover。

          目标：
          - 新交易发现、transactions 推送、kline 增量推送迁出 `Ticker`
          - candle finality 迁到 `CandleFinalityScheduler`
          - 删除 `Ticker.run` 后台 loop、`Ticker` 类和启动生命周期 wiring
          - 不保留兼容或诊断用 ticker 路径
          - 如果需要诊断，新增 diagnostics/observability 指标或 debug endpoint，不复用 ticker
          - 不再在 `Ticker` 中新增 positions 或其他产品实时 topic
