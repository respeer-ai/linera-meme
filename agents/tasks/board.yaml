          - 清理产品路径残留 fallback / dead live wiring
          - virtual positions / protocol fee receiver 语义继续只由 parse-block 后的 snapshot + projection 合成
          - pool catalog 的生产侧改为 parse-block 驱动，避免 consumer 再依赖历史 live 写入
