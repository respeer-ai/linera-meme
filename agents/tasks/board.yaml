      - id: POS-030
        status: Done
        priority: P0
        depends_on: [POS-029]
        title: Close maker wallet execution breakpoint diagnostics
        notes: |
          `/debug/pools/stall` now aggregates recent maker events, wallet swap trace, latest DB transaction, and wallet health, and outputs `lag_seconds` plus `suspected_stage`.
          Covered stages:
          - `maker_idle`
          - `wallet_metrics_unreachable`
          - `wallet_low_gas`
          - `wallet_memory_high`
          - `mutation_accepted_but_not_settled`
          - `unknown`

          Confirmed key facts:
          - The direct cause of the 2026-04-22 production maker-service CrashLoop was not wallet, but `service/kline/src/db.py` running `ensure_debug_indexes()` against an oversized `maker_events` table during startup; MySQL returned `1114 The table 'maker_events' is full`
          - Debug index creation and debug table writes are now best-effort. When the table is full, only `debug_storage_degraded` is recorded, and maker startup/main trading loop are no longer blocked
          - Later production review disproved the interim conclusion that there was no stable inbox processor: the pool creator chain still continuously produced blocks and processed inbox
          - Recent `PoolMessage::Swap` from the user chain consistently appears on the creator chain as `ReceiveMessages + Reject`
          - maker trace shows wallet mutations continuously returning 200, while pool `latestTransactions` and swap root remain stuck in the old time window, and real pool contract asset balances visibly drift from `reserve`

          Conclusion: the breakpoint has narrowed to "funds/messages reached the creator chain, but swap execution hard-failed", not kline missed synchronization or an unmonitored creator chain.
          The achievable diagnostic goal is complete: the system can expose the stage where maker->wallet mutation was accepted but projection did not settle.
          Because on-chain Reject does not have to carry contract panic details, "exact mapping to panic point" cannot be a completion condition.
