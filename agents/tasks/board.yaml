  - name: Funds Consistency
    tasks:
      - id: FUND-001
        status: Done
        priority: P0
        depends_on: []
        title: Define cross-chain funds consistency protocol boundary and state machine
        notes: |
          First close the protocol boundary, then implement. Confirmed:
          1. A non-contiguous `transaction_id` is not an error by itself. It is a real inconsistency only when a rejected or downstream-failed transaction still leaves reserve, total supply, share, or asset-custody side effects.
          2. Native `transfer` failure inside Linera Wasm contracts cannot be caught and does not return a recoverable failure response, so the protocol cannot rely on a payout-fail receipt.
          3. Cross-chain messages are not atomic. Meme input chains and pool payout chains must explicitly model pending, success-only completion, user-claim, or escrow semantics.
          4. Virtual liquidity, real reserve, and payable balance semantics must be closed together.
          5. Linera `tracked + bouncing` is a native one-hop reject receipt mechanism that can converge a target-chain reject into source-chain `pending -> failed/refund-ready`; it covers only one hop and cannot replace an explicit multi-hop business state machine.
          6. Current swap/add-liquidity/remove-liquidity flows must not introduce per-operation temp chains. Temp chains do not provide cross-chain atomicity and add open-chain fee, gas/funder, listener, cleanup, and permission complexity. Canonical reference: `agents/primitives/liquidity-and-funds.md`.

          The complete protocol is now split under `agents/primitives/funding/`. It covers create meme native pool, user `CreatePool` with initial liquidity, existing add liquidity, swap, remove, claim, internal entry boundaries, application reentrancy boundaries, projection boundaries, and per-path risks and mitigations.
          The document also captures code-review deltas: `CreatePool` is current user ABI only as create-with-initial-liquidity, legacy `UserPoolCreated` choreography must be collapsed or intent-bound, Claim is target ABI/state, PoolChainCreated/PoolCreated/Active semantics are split, tracked+bouncing convergence is path-level, and transaction id gaps are not errors by themselves.
      - id: FUND-002
        status: Done
        priority: P0
        depends_on: [FUND-001, REV-001]
        title: Fix pool/swap async funds closure under the unified protocol
        notes: |
          Umbrella implementation task for the funds-consistency protocol. This must be executed as progressive, independently verifiable iterations, not as one large patch validated only at the end.

          High-risk paths covered by the iteration sequence:
          - AddLiquidity partial two-leg success followed by failure without refund
          - swap/remove/refund/payout paths lacking reliable downstream meme/native delivery closure
          - initial pool creation swallowing downstream failure while persisting success
          - `NewTransaction` or other follow-up message rejection still leaving funds or state side effects

          Execution rules:
          - Each child iteration must define a narrow purpose, minimal related changes, and complete validation criteria that can pass before the next iteration starts.
          - Do not mix unrelated paths into a child iteration just because they share helpers.
          - Do not defer all correctness checks to final end-to-end validation.
          - Do not defer path-local authorization, source-chain, authenticated-caller, intent, token, leg, or state validation to the final hardening iteration.
          - Keep chain contracts as protocol truth and product data as parsed facts/projections.

          Constraints:
          - Outgoing application messages must be authenticated by default. Tracking is explicit per message and is enabled only after the owning handler defines a `message_is_bouncing()` branch for that path.
          - Do not mistake it for full workflow atomic rollback.
          - Later-hop failures still require the business protocol state machine.
          - Canonical implementation plan: `agents/primitives/funding/implementation-plan.md`.

          Closure:
          - Business funds-consistency protocol iterations are complete: FUND-005 through FUND-014 and final regression FUND-004 are Done.
          - Final validation passed with the full memory-limited Rust suite: `ulimit -v 80000000; CARGO_BUILD_JOBS=1 cargo test -j 1 -- --test-threads=1`.
          - An operations-system backlog task remains for cluster, chain, gas, funder, and stalled-workflow visibility; it is not part of business funds protocol closure.
