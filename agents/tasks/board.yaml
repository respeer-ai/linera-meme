      - id: FUND-008
        status: Done
        priority: P0
        depends_on: [FUND-007]
        title: "Iteration 3: Claim accounting and funds-exit foundation"
        notes: |
          Purpose: introduce the single funds-exit model before any workflow starts crediting owed value to it.

          Minimal changes:
          - Add claim-balance storage and accounting helpers.
          - Add target `Claim` operation ABI.
          - Implement native synchronous claim semantics.
          - Implement meme `claiming_balances` state for asynchronous delivery.
          - Keep refund, retry, protocol fee, remote liquidity, and excess as claim-balance meanings, not separate user operations.
          - Use test fixtures or internal test helpers to seed claim balances for `Claim` tests; do not add a production debug operation or public ABI for this.
          - Define concrete meme claim success/fail/bounce message enum variants and payload fields before implementation.

          Atomic steps:
          - 008-A1: Add `PoolOperation::Claim { token: Option<ApplicationId>, amount: Amount }`; owner is always derived from `authenticated_account()`.
          - 008-A2: Add receipt-first meme application-transfer ABI while keeping the existing receipt-free `TransferFromApplication` for unmigrated paths.
          - 008-A3: Implement meme `TransferFromApplicationWithReceipt` execution, success receipt emission, failure receipt emission, and bounce handling with `message_is_bouncing()`.
          - 008-A4: Add pool claim and claiming storage with token-first, owner-second helpers. Claim accounting uses explicit `MemeToken` token identity; existing unrelated `Option<ApplicationId>` token surfaces are not refactored in A4.
          - 008-A5: Implement pool `Claim` operation for native synchronous claim and meme asynchronous claim start.
          - 008-A6: Implement pool claim receipt handlers; meme transfer bounce is converted to failed receipt by the meme app, not detected directly by pool.
          - 008-A6.4: Make message tracking explicit. Runtime message sending must authenticate by default but must not track by default. Add a `tracking: bool` parameter to `HandlerMessage::new`, `HandlerOutcome::with_message`, and `ContractRuntimeContext::send_message`; do not introduce separate tracked-message APIs. Each outgoing message call site must pass `tracking` explicitly. In A6.4, only `MemeMessage::TransferFromApplicationWithReceipt` is `tracking: true`, because its handler already converts bounced delivery into a failed receipt. Other messages remain `tracking: false` until their owning funding iteration implements a handler-local `message_is_bouncing()` branch and tests. Future tracking candidates are `PoolMessage::RequestFund`, `MemeMessage::LiquidityFunded`, `SwapMessage::InitializeLiquidity`, `SwapMessage::CreatePool`, `SwapMessage::PoolCreated`, `SwapMessage::CreateUserPool`, `SwapMessage::UserPoolCreated`, `PoolMessage::FundSuccess`, `PoolMessage::FundFail`, `PoolMessage::AddLiquidity`, `PoolMessage::InitializeLiquidity`, `PoolMessage::Swap`, and `PoolMessage::RemoveLiquidity`.
          - 008-A6.5: Finalize claim receipt settlement. `PoolMessage::Claim` stays untracked and has no bounce branch because no state or funds change before it executes. `MemeMessage::TransferFromApplicationReceipt` inspects `message_is_bouncing()`; the bounced branch is documented no-op because legal receipt rejection is outside the normal protocol path and already leaves successful payouts locked in `claiming_balances`. `PoolOperation::ClaimTransferReceipt` directly settles `claim_success` or `claim_fail` on the pool chain. `PoolMessage::ClaimTransferReceipt` is removed to avoid an extra message hop.
          - 008-A7: Add pool claim-balance and claiming-balance query support for tests and projection integration. This is a single-pool chain fact query only. It is not a frontend batch-read interface. Frontend claim and claiming balance reads must use observability projection/API data maintained from parsed blocks across pools.
          - 008-A7.5: Lock claim settlement rejected semantics. Current Linera behavior leaves messages pending when per-block gas or block limits prevent inclusion; those limits are not receipt-reject causes. `TransferFromApplicationReceipt` bounce is defensive no-op only for explicit execution rejection, explicit node reject policy, ABI/deployment mismatch, implementation failure, or a receipt message that alone exceeds an execution limit. A rejected completed success receipt does not restore claimable balance, does not retry, and must be exposed by observability as paid out with claiming settlement rejected.
          - 008-A8: Add tests for storage shape, native claim, meme claim success, meme claim fail, meme transfer bounce before payout, malformed receipts, stale receipts, pending claiming balances, rejected completed receipt no-op semantics, and unchanged legacy receipt-free transfer paths.

          Validation:
          - Tests prove claim-balance storage uses token-first, owner-second shape.
          - Tests prove token claim balances update without duplicating token identity per owner.
          - Tests prove native claim succeeds or leaves balance unchanged on abort.
          - Tests prove meme claiming balance keeps the in-flight amount unavailable for another claim.
          - Tests prove meme claim success/fail receipt settlement validates authenticated caller, token, owner, amount, and claiming-balance state.
          - Tests prove malformed or stale meme claim callbacks cannot decrease `claiming_balances` or increase `claim_balances`.
          - Tests prove success decreases claiming balance and transfer failure before payout restores available claim balance.
          - Tests prove rejected completed `TransferFromApplicationReceipt` is documented no-op, does not dispatch settlement, does not restore claimable balance, and leaves claiming balance locked for observability.
          - Tests prove untracked messages are sent without tracking and tracked messages opt in explicitly.
          - Tests prove claim-path bounced messages do not execute normal settlement or dispatch on the wrong chain.
          - Tests prove pending forever remains safe and observable.

          Completed:
          - Claim-balance storage, target `Claim` operation, native claim, meme asynchronous claiming, receipt settlement, explicit tracking, claim queries, and product workflow E2E entrypoint are implemented.
          - Validation passed with `ulimit -v 33554432; cargo test -j 1`.
      - id: FUND-009
        status: Done
        priority: P0
        depends_on: [FUND-008]
        title: "Iteration 4: Existing-pool AddLiquidity two-leg pending"
        notes: |
          Purpose: make existing finalized-pool add liquidity safe using the established claim exit.

          Minimal changes:
          - Scope this iteration to ordinary existing-pool add liquidity after finalized reserve/share facts exist.
          - `PoolOperation::AddLiquidity` remains the user CreatePool funding entry after `UserPoolCreated` and the ordinary finalized-pool add-liquidity entry. It must not infer meme initialization or virtual-liquidity authority from pool state.
