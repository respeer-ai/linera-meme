      - id: POS-045
        status: Done
        priority: P1
        depends_on: [POS-044]
        title: Review kline OO architecture and eliminate facade/URL pass-through transitional states
        notes: |
          Overall observability functionality, code, and architecture review is complete. This round does not include high-risk major refactors.

          Review scope:
          - Layer 1 ingestion/cursor/raw storage
          - application registry / decoder dispatch / Rust decoder runner
          - Layer 2 normalization / pool catalog projection materialization
          - Layer 3 market derivation / settled trades / liquidity / snapshots
          - product query read models / serializers / stats / positions / position-metrics
          - realtime event queue / publisher / candle finality / websocket invalidation
          - diagnostics/debug/fail-open lifecycle
          - bootstrap/lifecycle/runtime composition and external integration client boundaries

          Main conclusions:
          - The L1->L2->L3 main path is implemented as a layered data platform: producer facts come from parsed chain blocks, normalized events are generated by decoder/normalizer, and consumer-facing business data is provided by Layer 3 projection repos/read models.
          - `PostIngestPipeline` explicitly chains normalization -> market derivation, and `MarketDerivationWorker` publishes market-data events only after projection materialization succeeds. This matches the "projection commit drives realtime" constraint.
          - Active runtime for `/transactions`, `/points`, `/positions`, `/position-metrics`, stats/read models is wired through `KlineRuntime` to projection repos/read models. No product handler was found using live chain query or `latestTransactions` as business truth.
          - Product dependencies on `latestTransactions` are cleaned from kline src/tests. Current Layer 3 facts use block-observed `pool_new_transaction_recorded`, not the pool state history queue.
          - diagnostics/realtime debug writes are best-effort and bounded by TTL/max-row quotas, satisfying the constraint that diagnostics must not take down business paths.
          - Account parsing is centralized in `AccountCodec`; runtime write paths use public account shape. The account-format UPDATE in `ensure_schema()` is a historical data migration boundary, not runtime compatibility fallback.
          - `position_metrics_pool_application_payload_*` is not a product runtime truth path and should remain only in legacy/integration/test boundaries. It must not re-enter product read paths.

          Follow-up structure cleanup that does not block current completion:
          - `service/kline/src/db.py` is still a legacy monolith mixing debug persistence, old table schema, historical methods, and compatibility surface. It is not canonical architecture and should be gradually split into storage/diagnostics/repositories.
          - `service/kline/src/kline.py` is still a large FastAPI entrypoint with global state, endpoint wiring, debug endpoints, and runtime construction. It should later be split into query/diagnostics API composition layers instead of being expanded further.
          - `app/bootstrap.py` is currently the composition root, but object assembly is heavy and repeats decoder/repo/pipeline bundle construction. It can later be split into observability container builder / projection pipeline builder / integration client builder.
          - `ObservabilityFacade` and `KlineObservabilityDebugService` currently mainly wrap fail-open/debug payload behavior, which is acceptable. Do not expand them into pass-through layers with no independent policy.
          - URL/base URL assembly still exists at the outer/integration boundary:
            `kline.py`、`maker.py`、`funder.py`、`app/bootstrap.py`、`integration/*client.py`。
            This is acceptable as a migration transitional state. The stable target is to inject configured client/transport objects from the outer layer and stop passing resolved endpoint strings through inner layers.
          - There are many `position_metrics_*` modules, and naming still carries historical stage traces. The business-truth boundary has converged to projection, but code structure should later be regrouped by read-model/snapshot/replay/diagnostics to avoid further fragmentation.

          Completion standard:
          - Reviewed functionality, code, and architecture boundaries across the full observability path
          - Recorded evidence that satisfies architecture constraints, acceptable transitional states, and follow-up structural cleanup points
          - Found no product business-truth violation that must immediately block closing the current observability batch
      - id: POS-027
