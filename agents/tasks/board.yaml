        title: 设计基于链区块的可靠观测与事件同步系统
        notes: 当前不仅 `position-metrics`，连 `ticker` / K 线 / 持仓 / fee 计算都依赖合约侧 `latestTransactions` 最近窗口，可靠性不足。现已明确该项要独立推进，但它是整个 `service/kline` 重构里的核心子系统之一，不是全部范围；全服务目标架构见 `agents/context/kline-service-architecture.md`，整包迁移见 `agents/runbooks/kline-service-migration.md`，现有 endpoint/job/debug surface 到新模块的覆盖映射见 `agents/runbooks/kline-capability-mapping.md`，目标包结构与依赖方向见 `agents/primitives/kline-package-layout.md`，API 到 read model/serializer/compatibility 的契约见 `agents/primitives/kline-api-read-models.md`，第一阶段实施计划见 `agents/runbooks/kline-phase1-plan.md`。该子系统目标方向：1) 订阅 chain 的新区块事件，实时获取区块推进；2) 支持按链上位置拉取完整区块并解析交易、消息、`ReceiveMessages/Reject` 等执行结果，作为可靠补偿路径；3) 本地维护每条链已处理到的链上进度水位，统一为交易落库、K 线、positions、fees、reject 诊断提供同一真相源；4) 当订阅断开、主机资源不足导致处理落后、或本地进度与链上最新进度不一致时，按链上顺序补拉直到追平；5) 在该能力完成后，把 `latestTransactions` 从“历史真相源”降级为可选辅助查询或彻底移出。新增约束：主路径必须事件驱动，不能以 cron / 周期轮询作为常态驱动；catch-up 只允许由 startup reconcile、subscription reconnect、detected lag/gap、或显式 admin repair 触发。新增活性约束：debug/observability 不得破坏主服务活性，query API 必须 fail-open；观测依赖、raw schema、trace 持久化、startup catch-up、notification listener 任一失败都只能让 observability 子系统降级，不能阻断 `service/kline` 启动或 steady-state serving。具体采用区块高度、hash、cursor 或其他 Linera 原生位置语义，待后续结合 `linera-protocol` 代码确认
