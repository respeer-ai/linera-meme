      - id: POS-022
        status: Doing
        priority: P0
        depends_on: [POS-021]
        title: service/kline 新增 position metrics 接口
        notes: 已新增 /position-metrics，并接入 position 历史流动性记录、全池 transaction history 和开仓后池子 swap 计数；在当前锁定 virtual initial supply 语义下，无 swap 时无论是否 virtual initial liquidity 都可返回 exact principal=redeemable / fee=0；有 swap 时，现已支持“以用户最后一次流动性变更为基准，其之后池子再无任何 Add/RemoveLiquidity”的严格子集：若最后一次变更是 Add，则其之前通常不能有 swap；但若 owner 当前就是 fee_to，且 latest Add 之前 owner 净流动性为 0，则允许把 latest Add 时同步 mint 到 owner 的 protocol fee shares 识别为 fee 而非 principal，因此 fee-on 池子里 fee_to 本人开仓后也可返回 exact fee，不再一律 Unavailable。若最后一次变更是 Remove，则允许它之前已有 swap，并把这次 Remove 后的剩余仓位视为新的精确基准，因此已覆盖单次 Add、Add 后部分 Remove、swap 后 Remove 再继续持仓/继续被后续 swap 稀释、以及 fee_to owner 领取 protocol fee shares 的场景。实现基于当前 Uniswap V2 fee-on 语义重放 total_supply/reserve/k_last 历史，并用 fee-free counterfactual swap path 精确拆分 principal/fee；当记录历史在批次边界缺少一笔可由后续同批两笔 swap 唯一反推的 hidden swap 时，现也会把该隐含 swap 重建进 replay，而不再直接退化成 Unavailable。其余开仓后仍有流动性变更、latest Add 之前已发生 swap 且无法归因为 fee_to protocol mint、或历史无法重放的场景仍返回更具体 blockers。新增确认：当前费用卡住不只是算法子集不足，还暴露出两类底层问题需要并行处理：1) 金融数值精度链路仍有风险，`service/kline/src/async_request.py` 目前用默认 `json.loads`，若上游返回 JSON number 会先落成 Python float，必须改为 Decimal-safe 解析并继续排查 live GraphQL -> MySQL -> API 的全链路字符串/Decimal 传递；2) 已证明 `service/kline` 的历史同步存在 bug：ticker 曾把只保留最近 5000 条的 `latestTransactions(startId)` 当成历史修复来源，DB 一旦出现老内部缺口且该缺口已滑出 5000 窗口，就会永久留洞。现已改为保留“最近 5000 条仍可用于 recent backfill/增量同步”的事实，但不再把该接口冒充成全历史修复；同时已确认 accepted transaction history 不能假设 `transaction_id` 连续，因为上游 `Reject` 会合法消耗 id 但不会进入 `latestTransactions`，所以 `position-metrics` 和 ticker 诊断都不再把 id 跳号直接视为 incomplete history，而只保留 live-vs-DB 实际返回集合的差异诊断。现 `/debug/pool` 也可按需导出 DB 历史、owner liquidity history、gap summary、diagnostics，以及最近窗口 live-vs-DB transaction id 差异，便于直接定位生产缺口是否仍落在 recent 5000 内
      - id: POS-023
        status: Doing
        priority: P0
        depends_on: [POS-022]
        title: 前端接入真实 position fee 展示
        notes: 前端已切到消费 /position-metrics，不再使用 24h 成交量近似 fee；当前线上在 exact_fee_supported=false 时仍显示 `Syncing` 作为临时占位，但这不是最终语义。后续目标不是展示“不可计算”，而是在 POS-022/024 把底层精度和交易队列问题修到足以返回真实值或带轻微误差说明的值；在此之前不要引入与当前算法无关的 TVL/24h volume 近似
      - id: POS-025
        status: Todo
        priority: P0
        depends_on: [POS-022]
        title: position-metrics 改为与池历史长度无关的物化查询
        notes: 当前 /position-metrics 仍需按请求读取全池 transaction history 并重放，时间复杂度随池历史长度增长。下一步改为仅在 service/kline 侧实现写时物化和查询时常数级读取：为每个 pool 维护可增量更新的 live / fee-free 累积状态，为每个 owner+pool active position 维护“最近一次流动性变更”为 basis 的快照；查询时只读取 position basis snapshot 和 pool current snapshot，不再扫描全历史。该任务只涉及 kline/MySQL/同步逻辑与接口实现，不修改 pool/swap 合约侧语义
      - id: POS-026
        status: Todo
        priority: P0
        depends_on: []
        title: 设计基于链区块的可靠交易事件同步系统
        notes: 当前不仅 `position-metrics`，连 `ticker` / K 线 / 持仓 / fee 计算都依赖合约侧 `latestTransactions` 最近窗口，可靠性不足。先记录需求，不在本任务内展开 `linera-protocol` 细节学习与实现。目标方向：1) 订阅 chain 的新区块事件，实时获取区块推进；2) 支持按区块标识拉取完整区块并解析其中交易/消息，作为可靠补偿路径；3) 本地维护每条链已处理到的链上进度水位；4) 当订阅断开、主机资源不足导致处理落后、或本地进度与链上最新进度不一致时，按链上顺序补拉直到追平；5) 统一为交易落库、K 线、positions、fees 提供可重放的可靠事件源。若该能力成立，后续还需要专项评估合约内 `latestTransactions` 是否仍有保留必要，或可从“K 线依赖的最近窗口”退化为可选辅助查询，因为届时我们本地将具备自建可靠交易事件系统。具体采用区块高度、hash、cursor 或其他 Linera 原生位置语义，待后续结合 `linera-protocol` 代码确认
      - id: POS-024
        status: Doing
        priority: P0
        depends_on: []
        title: pool/swap 语义对齐 Uniswap V2
        notes: 已移除未生效的 protocol_fee_percent_mul_100，当前锁定为固定 Uniswap V2 fee-on 语义；swap 输出改为 constant-product with input-side fee，swap invariant 改为基于真实 amount_in/out 校验，非零 total_supply 的 add-liquidity mint 改为按 fee mint 后 total_supply 和现有 reserve 比例计算；同时修正 k_last 不再在 swap 时刷新，并让 remove_liquidity 也会结算 mint_fee 和更新 reserves。`validate_swap_invariant` / `mint_protocol_fee` / `update_k_last` 已从 StateInterface 顶层 helper 收回到 swap/add/remove 主流程，只保留 Pool 纯数学函数。pool service 的 `totalSupply` / `liquidity(owner)` / `calculate_amount_liquidity` 查询现已按 pending protocol fee 稀释后的 effective total supply 返回，避免把尚未 mint 的 protocol share 错算进用户可提资产；并新增了真实集成级 GraphQL 回归来断言 swap 后 `totalSupply/liquidity(owner)` 已体现 pending fee 稀释，不过该集成测在当前环境执行仍会被 Wasmer 模块实例化阶段的 os error 12 卡住，只能先完成 no-run 编译校验并依赖轻量 service 单测验证语义。virtual initial liquidity 现已转为锁定初始 supply，不再把初始储备注入首个真实 LP；contract 回归已覆盖初始 user liquidity=0、首次 add 后 user liquidity<total_supply、用户清空自身 LP 后池子仍保留锁定 supply/reserve。另已开始修正 `NewTransaction` 历史写入的内容级去重问题，改为预分配稳定 transaction_id 以保留真实重复交易，同时仍对重复消息投递保持幂等；当前代码和测试已表明“同内容但不同 transaction_id”的真实交易应被保留，但仍需核验线上坏历史是否来自旧版本遗留，以及 async 闭环在 `NewTransaction` 前中断时是否造成永久历史缺口；受限内存下 Wasmer 集成测仍需单独环境验证
