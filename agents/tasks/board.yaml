        notes: 已直接扩展现有 `service/kline/src/maker_api.py`，复用 `Db` 与现有 trace/event 表，在 maker-service 原 `8080` 上提供只读 debug API，避免再起第三个进程和新端口。当前已落地 `/debug/wallets`、`/debug/wallets/{index}/metrics`、`/debug/wallets/{index}/balances`、`/debug/traces`、`/debug/pools/stall`、`/debug/health`；接口会聚合 wallet metrics、wallet GraphQL 余额、maker DB 事件和 pool 最新交易水位，并返回语义化 health/stall 结论
      - id: POS-030
        status: Doing
        priority: P0
        depends_on: [POS-029]
        title: maker wallet 执行断点诊断闭环
        notes: 已在 `/debug/pools/stall` 聚合最近 maker event、wallet swap trace、DB 最新 transaction 和 wallet health，并输出 `lag_seconds` 与 `suspected_stage`；当前已覆盖 `maker_idle` / `wallet_metrics_unreachable` / `wallet_low_gas` / `wallet_memory_high` / `mutation_accepted_but_not_settled` / `unknown`，并补了最小 API 假数据回归。新增确认：2026-04-22 线上 maker-service CrashLoop 的直接原因不是 wallet，而是 `service/kline/src/db.py` 在启动时对超大 `maker_events` 表执行 `ensure_debug_indexes()`，MySQL 返回 `1114 The table 'maker_events' is full`，导致 maker 主进程与 maker API 进程双双退出。现已把 debug 索引创建与 debug 表写入改为 best-effort：表满时只记录 `debug_storage_degraded`，不再阻断 maker 启动和主交易循环。新增落地：现已将 `docker/maker-entrypoint.sh` 从 `maker.py & maker_api.py` 双进程改为单进程 `maker_api.py`，并把交易循环内嵌到 API 生命周期里；启动时会在同一进程创建独立 trader DB 连接并拉起后台交易任务，异常时不再直接丢失整个交易循环，而是记录 `last_error`、累计 `consecutive_failures` 并按退避继续重试，同时通过 `/debug/health` 与新增 `/debug/trader` 暴露循环状态，避免再次出现“API 还活着但 maker 子进程已死”的假健康。另已为 `debug_traces` 增加事件驱动的分层保留与空间预算控制：新写入会按成功/失败分级裁剪大字段，超出 1GiB 预算时优先删除过期数据、对旧成功 trace 做采样保留、压缩旧 payload，并在发生实际清理后执行 `OPTIMIZE TABLE debug_traces` 回收 `.ibd` 空间，从而保留最近窗口和失败上下文而不是简单粗暴清空；当前保留预算和清理节奏可通过 `KLINE_DEBUG_TRACES_*` 环境变量调节，并可通过 `/debug/storage` 或 `/debug/traces?include_storage=true` 直接查看运行中的生效配置与表空间占用。剩余工作是部署后继续核对 2026-04-21 13:10 CST 之后真实线上 wallet/listener 指标，并确认单进程自恢复后 K 线停滞是否仍是 `mutation accepted but not settled`
      - id: POS-024
        status: Doing
        priority: P0
        depends_on: []
        title: pool/swap 语义对齐 Uniswap V2
        notes: 已移除未生效的 protocol_fee_percent_mul_100，当前锁定为固定 Uniswap V2 fee-on 语义；swap 输出改为 constant-product with input-side fee，swap invariant 改为基于真实 amount_in/out 校验，非零 total_supply 的 add-liquidity mint 改为按 fee mint 后 total_supply 和现有 reserve 比例计算；同时修正 k_last 不再在 swap 时刷新，并让 remove_liquidity 也会结算 mint_fee 和更新 reserves。`validate_swap_invariant` / `mint_protocol_fee` / `update_k_last` 已从 StateInterface 顶层 helper 收回到 swap/add/remove 主流程，只保留 Pool 纯数学函数。pool service 的 `totalSupply` / `liquidity(owner)` / `calculate_amount_liquidity` 查询现已按 pending protocol fee 稀释后的 effective total supply 返回，避免把尚未 mint 的 protocol share 错算进用户可提资产；并新增了真实集成级 GraphQL 回归来断言 swap 后 `totalSupply/liquidity(owner)` 已体现 pending fee 稀释，不过该集成测在当前环境执行仍会被 Wasmer 模块实例化阶段的 os error 12 卡住，只能先完成 no-run 编译校验并依赖轻量 service 单测验证语义。virtual initial liquidity 现已转为锁定初始 supply，不再把初始储备注入首个真实 LP；contract 回归已覆盖初始 user liquidity=0、首次 add 后 user liquidity<total_supply、用户清空自身 LP 后池子仍保留锁定 supply/reserve。另已开始修正 `NewTransaction` 历史写入的内容级去重问题，改为预分配稳定 transaction_id 以保留真实重复交易，同时仍对重复消息投递保持幂等；当前代码和测试已表明“同内容但不同 transaction_id”的真实交易应被保留，但仍需核验线上坏历史是否来自旧版本遗留，以及 async 闭环在 `NewTransaction` 前中断时是否造成永久历史缺口；受限内存下 Wasmer 集成测仍需单独环境验证
