        - storage model
        - market data semantics
      outputs:
        - phased implementation order
        - validation checkpoints
      stop_conditions:
        - raw ingestion is replay-safe
        - kline is sourced from Layer 3 instead of latestTransactions
    - path: agents/skills/kline-service-migration/SKILL.md
