version: 1
entry:
  readme: agents/README.md
required_read_order:
  - agents/index.yaml
  - agents/context/project-rules.md
  - agents/context/doc-standard.md
  - agents/context/prompt-economy.md
  - agents/tasks/prompt-state.yaml
optional_read_after_prompt_state:
  - agents/tasks/board.yaml
task_source:
  primary: agents/tasks/board.yaml
  derived_prompt_state: agents/tasks/prompt-state.yaml
  board_read_policy: read only when prompted by prompt-state or when updating task state
rules_source:
  primary: agents/context/project-rules.md
assistant_doc_roots:
  - agents/
  - docker/AGENTS.md
local_scope_rule:
  instruction: Before editing a directory, check for the nearest AGENTS.md in that directory or its parents.
decision_map:
  ownership_bug:
    read_first:
      - agents/primitives/identity-and-origin.md
      - agents/primitives/cross-chain.md
      - agents/skills/bug-investigation/SKILL.md
  chart_discrepancy:
    read_first:
      - agents/primitives/data-sources.md
      - agents/context/current-capabilities.md
      - agents/skills/bug-investigation/SKILL.md
  positions_bug:
    read_first:
      - agents/primitives/liquidity-and-funds.md
      - agents/primitives/identity-and-origin.md
      - agents/context/current-capabilities.md
      - agents/skills/bug-investigation/SKILL.md
  deployment_issue:
    read_first:
      - agents/primitives/service-routing.md
      - agents/skills/local-deployment/SKILL.md
      - docker/AGENTS.md
  funds_consistency_issue:
    read_first:
      - agents/primitives/funding/architecture.md
      - agents/primitives/funding/state-machines.md
      - agents/primitives/funding/claim.md
      - agents/primitives/funding/open-issues.md
      - agents/primitives/liquidity-and-funds.md
      - agents/primitives/cross-chain.md
      - agents/skills/bug-investigation/SKILL.md
  async_contract_issue:
    read_first:
      - agents/primitives/cross-chain.md
      - agents/primitives/identity-and-origin.md
      - agents/skills/bug-investigation/SKILL.md
  testing_task:
    read_first:
      - agents/skills/testing/SKILL.md
      - agents/context/project-rules.md
      - agents/tasks/prompt-state.yaml
