apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: query-service
  namespace: kube-system
spec:
  serviceName: query-service
  replicas: ${QUERY_REPLICAS}
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: query-service
  template:
    metadata:
      labels:
        app: query-service
    spec:
      initContainers:
      - name: init-wallet
        image: npool/linera-respeer:latest
        imagePullPolicy: Always
        command:
        - /bin/sh
        - -c
        - |
          echo "Reinitializing query wallet..."
          if [ -f /wallet/wallet.json -o -f /wallet/keystore.json -o -e /wallet/client.db ]; then
            backup_dir="/wallet/backup-$(date +%Y%m%d%H%M%S)"
            mkdir -p "$backup_dir"
            [ -f /wallet/wallet.json ] && mv /wallet/wallet.json "$backup_dir"/
            [ -f /wallet/keystore.json ] && mv /wallet/keystore.json "$backup_dir"/
            [ -e /wallet/client.db ] && mv /wallet/client.db "$backup_dir"/
            echo "Backed up existing query wallet to $backup_dir"
          fi
          ./linera --wallet /wallet/wallet.json --keystore /wallet/keystore.json --storage rocksdb:/wallet/client.db wallet init --faucet ${FAUCET_URL}
          ./linera --wallet /wallet/wallet.json --keystore /wallet/keystore.json --storage rocksdb:/wallet/client.db wallet request-chain --faucet ${FAUCET_URL}
        volumeMounts:
        - name: query-pvc
          mountPath: /wallet
      containers:
      - name: query-service
        image: npool/linera-respeer:latest
        imagePullPolicy: Always
        command: ["/bin/sh", "-c", "./rpc-entrypoint.sh"]
        env:
        - name: RUST_LOG
          value: info
        volumeMounts:
        - name: query-pvc
          mountPath: /wallet
        resources:
          requests:
            cpu: "300m"
            memory: "1024Mi"
          limits:
            cpu: "600m"
            memory: "2048Mi"
  volumeClaimTemplates:
    - metadata:
        name: query-pvc
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi

---
apiVersion: v1
kind: Service
metadata:
  name: query-service
  namespace: kube-system
spec:
  ports:
    - name: query-service
      port: 30080
      targetPort: 30080
    - name: query-metrics
      port: 30082
      targetPort: 30082
  selector:
    app: query-service
