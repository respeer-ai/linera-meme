apiVersion: apps/v1
kind: Deployment
metadata:
  name: kline-service
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kline-service
  template:
    metadata:
      labels:
        app: kline-service
    spec:
      containers:
      - name: kline-service
        image: npool/kline:latest
        imagePullPolicy: Always
        command:
        - /bin/sh
        - -c
        - |
          SWAP_CHAIN_ID=$(cat /shared-app-data/SWAP_MULTI_OWNER_CHAIN_ID)
          SWAP_APPLICATION_ID=$(cat /shared-app-data/SWAP_APPLICATION_ID)
          SWAP_CHAIN_ID=$SWAP_CHAIN_ID SWAP_APPLICATION_ID=$SWAP_APPLICATION_ID SWAP_HOST=query-service:30080 ./kline-entrypoint.sh
        env:
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-password-secret
              key: rootpassword
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: MYSQL_DATABASE
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: mysql-password-secret
              key: username
        - name: DATABASE_PORT
          value: "3306"
        - name: DATABASE_HOST
          value: mysql
        - name: KLINE_DEBUG_TRACES_MAX_BYTES
          value: "1073741824"
        - name: KLINE_DEBUG_TRACES_CLEANUP_INTERVAL_MS
          value: "300000"
        - name: KLINE_DEBUG_TRACES_RECENT_FULL_MS
          value: "21600000"
        - name: KLINE_DEBUG_TRACES_SUCCESS_RETENTION_MS
          value: "604800000"
        - name: KLINE_DEBUG_TRACES_FAILURE_RETENTION_MS
          value: "1209600000"
        - name: KLINE_DEBUG_TRACES_SUCCESS_SAMPLE_MOD
          value: "25"
        - name: KLINE_DEBUG_TRACES_HARD_PRESSURE_SUCCESS_SAMPLE_MOD
          value: "100"
        - name: KLINE_DEBUG_TRACES_CLEANUP_BATCH_SIZE
          value: "2000"
        volumeMounts:
        - name: shared-app-data
          mountPath: /shared-app-data
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
      volumes:
      - name: shared-app-data
        persistentVolumeClaim:
          claimName: shared-app-data

---
apiVersion: v1
kind: Service
metadata:
  name: kline-service
  namespace: kube-system
spec:
  ports:
    - name: kline-service
      port: 25080
      targetPort: 25080
  selector:
    app: kline-service
